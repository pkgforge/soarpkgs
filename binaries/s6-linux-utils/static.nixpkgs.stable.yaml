#!/SBUILD ver @v1.0.0
#SELF: https://raw.githubusercontent.com/pkgforge/soarpkgs/refs/heads/main/binaries/s6-linux-utils/static.nixpkgs.stable.yaml
_disabled: false

pkg: "s6-linux-utils"
pkg_id: "nixpkgs.s6-linux-utils"
pkg_type: "static"
category:
  - "ConsoleOnly"
  - "Utility"
description: "A set of minimalistic Linux-specific system utilities"
distro_pkg:
  alpine:
    - "s6-linux-utils"
  nixpkgs:
    - "s6-linux-utils"
homepage:
  - "https://skarnet.org/software/s6-linux-utils/"
license:
  - "ISC"  
maintainer:
  - "Azathothas (https://github.com/Azathothas)"
note:
  - "[DO NOT RUN] (Meant for pkgforge CI Only)"
  - "Built Using Nix. Check/Report @ https://github.com/NixOS/nixpkgs"
provides:
  - "rngseed"
  - "s6-chroot"
  - "s6-freeramdisk"
  - "s6-hostname"
  - "s6-logwatch"
  - "s6-mount"
  - "s6-pivotchroot"
  - "s6-ps"
  - "s6-swapoff"
  - "s6-swapon"
  - "s6-umount"  
repology:
  - "s6-linux-utils"
src_url:
  - "https://github.com/skarnet/s6-linux-utils"
tag:
  - "sys-apps"
x_exec:
  host:
    - "aarch64-Linux"
    - "x86_64-Linux"
  shell: "bash"
  pkgver: |
    nix derivation show "nixpkgs#s6-linux-utils" --impure --refresh --quiet 2>&1 | jq -r '.. | objects | select(has("version")) | .version' | tr -d '[:space:]'
  run: |
    #Build
     NIXPKGS_ALLOW_BROKEN="1" NIXPKGS_ALLOW_UNSUPPORTED_SYSTEM="1" \
     nix-build '<nixpkgs>' --impure --attr "pkgsStatic.s6-linux-utils" --cores "$(($(nproc)+1))" --max-jobs "$(($(nproc)+1))" --log-format bar-with-logs --out-link "${SBUILD_TMPDIR}/nixbuild"
     find -L "${SBUILD_TMPDIR}/nixbuild" | sort | awk -F/ '{indent=""; for (i=2; i<NF; i++) indent=indent " "; print (NF>1 ? indent "--> " $NF : $NF)}'
    #Fix Perms
     find "${SBUILD_TMPDIR}/nixbuild" -maxdepth 1 -type d -o -type l -exec realpath "{}" \; | grep -Ev '^\.$' |\
     xargs -I{} find "{}" -type d -iname "*bin*" | \
     xargs -I{} sudo rsync -achLv --no-relative "{}/." "${SBUILD_TMPDIR}/."
     sudo chown -Rv "$(whoami):$(whoami)" "${SBUILD_TMPDIR}" && chmod -Rv 755 "${SBUILD_TMPDIR}"
    #Fix Shell Scripts
     find "${SBUILD_TMPDIR}" -maxdepth 1 -type f \( -name "*.sh" -o -exec sh -c 'file -i "$1" | grep -qiv "application/.*executable"' sh {} \; \) -print0 | xargs -0 -I {} sh -c '
           sed "s|^#!/nix/store/.*/bin/sh|#!/bin/sh|" -i "{}" 2>/dev/null
           sed "s|/nix/store[^ ]*/bin/\([^ ]*\)|/usr/local/bin/\1|g" -i "{}" 2>/dev/null
           sed "s|/nix/store/[^/]*/bin|/usr/local/bin|g" -i "{}" 2>/dev/null
           sed "s|/nix/store[^/ ]*/bin|/usr/local/bin|g" -i "{}" 2>/dev/null
           sed "s|/nix/store[^ \"'\'']*|/|g" -i "{}" 2>/dev/null
       '
    #Copy
     find "${SBUILD_TMPDIR}" -maxdepth 1 -type f -exec file -i "{}" \; | grep -Ei 'application/x-executable|text/x-shellscript' | cut -d":" -f1 | xargs realpath | sort -u | xargs -I "{}" rsync -achvL "{}" "${SBUILD_OUTDIR}"