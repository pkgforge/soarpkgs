#!/SBUILD ver @v1.0.0
#SELF: https://raw.githubusercontent.com/pkgforge/soarpkgs/refs/heads/main/binaries/s6/static.nixpkgs.stable.yaml
_disabled: false

pkg: "s6"
pkg_id: "nixpkgs.s6"
pkg_type: "static"
category:
  - "ConsoleOnly"
  - "Utility"
description: "A small suite of programs for UNIX, designed to allow process supervision"
homepage:
  - "https://skarnet.org/software/s6/"
license:
  - "ISC"  
maintainer:
  - "Azathothas (https://github.com/Azathothas)"
note:
  - "[DO NOT RUN] (Meant for pkgforge CI Only)"
  - "Built Using Nix. Check/Report @ https://github.com/NixOS/nixpkgs"
provides:
  - "s6-accessrules-cdb-from-fs"
  - "s6-accessrules-fs-from-cdb"
  - "s6-applyuidgid"
  - "s6-cleanfifodir"
  - "s6-connlimit"
  - "s6-envdir"
  - "s6-envuidgid"
  - "s6-fdholder-daemon"
  - "s6-fdholder-delete"
  - "s6-fdholder-getdump"
  - "s6-fdholder-list"
  - "s6-fdholder-retrieve"
  - "s6-fdholder-setdump"
  - "s6-fdholder-store"
  - "s6-fdholder-transferdump"
  - "s6-fdholderd"
  - "s6-fghack"
  - "s6-ftrig-listen"
  - "s6-ftrig-listen1"
  - "s6-ftrig-notify"
  - "s6-ftrig-wait"
  - "s6-ftrigrd"
  - "s6-instance-control"
  - "s6-instance-create"
  - "s6-instance-delete"
  - "s6-instance-list"
  - "s6-instance-maker"
  - "s6-instance-status"
  - "s6-ioconnect"
  - "s6-ipcclient"
  - "s6-ipcserver"
  - "s6-ipcserver-access"
  - "s6-ipcserver-socketbinder"
  - "s6-ipcserverd"
  - "s6-log"
  - "s6-mkfifodir"
  - "s6-notifyoncheck"
  - "s6-permafailon"
  - "s6-setlock"
  - "s6-setsid"
  - "s6-setuidgid"
  - "s6-socklog"
  - "s6-softlimit"
  - "s6-sudo"
  - "s6-sudoc"
  - "s6-sudod"
  - "s6-supervise"
  - "s6-svc"
  - "s6-svdt"
  - "s6-svdt-clear"
  - "s6-svlink"
  - "s6-svlisten"
  - "s6-svlisten1"
  - "s6-svok"
  - "s6-svperms"
  - "s6-svscan"
  - "s6-svscanctl"
  - "s6-svstat"
  - "s6-svunlink"
  - "s6-svwait"
  - "s6-tai64n"
  - "s6-tai64nlocal"
