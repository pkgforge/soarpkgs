#!/SBUILD ver @v1.0.0    
#SELF: https://raw.githubusercontent.com/pkgforge/soarpkgs/refs/heads/main/binaries/axel/static.stunnel.stable.yaml
_disabled: false

pkg: "axel"
pkg_id: "github.com.axel-download-accelerator.axel"
pkg_type: "static"
category:
  - "ConsoleOnly"
  - "Utility"
description: "Lightweight CLI download accelerator"
homepage:
  - "https://github.com/axel-download-accelerator/axel"
license:
  - "GPL-2.0"  
maintainer:
  - "Azathothas (https://github.com/Azathothas)"
note:
  - "[DO NOT RUN] (Meant for pkgforge CI Only)"
  - "Built From Source. Check/Report @ https://github.com/axel-download-accelerator/axel"
repology:
  - "axel"
src_url:
  - "https://github.com/axel-download-accelerator/axel"
tag:
  - "downloader"
  - "download-manager"
x_exec:
  shell: "bash"
  pkgver: |
    pushd "$(mktemp -d)" >/dev/null 2>&1 && \
    git clone --filter="blob:none" --no-checkout --single-branch --quiet "https://github.com/axel-download-accelerator/axel" "./TEMPREPO" >/dev/null 2>&1 && \
    git --git-dir="./TEMPREPO/.git" --no-pager log -1 --pretty=format:'latest.%cd.%h' --date=format:'%y%m%dT%H%M%S' && \
    popd >/dev/null 2>&1
  run: |
    #Build
     docker stop "alpine-builder" >/dev/null 2>&1 ; docker rm "alpine-builder" >/dev/null 2>&1
     docker run --privileged --net="host" --name "alpine-builder" --pull="always" "azathothas/alpine-builder:latest" \
      bash -l -c '
      #Setup ENV
       mkdir -p "/build-bins" && pushd "$(mktemp -d)" >/dev/null 2>&1
      #Build
       git clone --filter "blob:none" --quiet "https://github.com/axel-download-accelerator/axel" && cd "./axel"
       export CFLAGS="-O2 -flto=auto -static -w -pipe"
       export CXXFLAGS="${CFLAGS}"
       export CPPFLAGS="${CFLAGS}"
       export LDFLAGS="-static -s -Wl,-S -Wl,--build-id=none"
       autoreconf -iv ; "./configure" --disable-shared --disable-Werror --enable-static --enable-year2038 --enable-compile-warnings="no" --with-ssl="openssl"
       make --jobs="$(($(nproc)+1))" --keep-going
      #Copy
       #cp "./axel" "/build-bins/axel"
       find "." -maxdepth 1 -type f -exec file -i "{}" \; | grep "application/.*executable" | cut -d":" -f1 | xargs realpath | xargs -I {} rsync -achvL "{}" "/build-bins/"
      #strip & info 
       find "/build-bins/" -type f -exec objcopy --remove-section=".comment" --remove-section=".note.*" "{}" \;
       find "/build-bins/" -type f ! -name "*.no_strip" -exec strip --strip-debug --strip-dwo --strip-unneeded "{}" \; >/dev/null 2>&1
       file "/build-bins/"* && du -sh "/build-bins/"*
       popd >/dev/null 2>&1
      '
    #Copy & Meta
     docker cp "alpine-builder:/build-bins/." "$(pwd)/"
     find "${SBUILD_TMPDIR}" -maxdepth 1 -type f -exec file -i "{}" \; | grep "application/.*executable" | cut -d":" -f1 | xargs realpath | xargs -I "{}" rsync -achvL "{}" "${SBUILD_OUTDIR}"