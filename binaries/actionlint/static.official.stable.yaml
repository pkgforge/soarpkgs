#!/SBUILD ver @v1.0.0
#SELF: https://raw.githubusercontent.com/pkgforge/soarpkgs/refs/heads/main/binaries/actionlint/static.official.stable.yaml
_disabled: false

pkg: "actionlint"
pkg_id: "github.com.rhysd.actionlint"
pkg_type: "static"
category:
  - "ConsoleOnly"
  - "Utility"
description: "Static checker for GitHub Actions workflow files"
distro_pkg:
  alpine:
    - "actionlint"
  archlinux:
    aur:
      - "actionlint-bin"
      - "actionlint-git"
    extra:
      - "actionlint"
  nixpkgs:
    - "actionlint"
homepage:
  - "https://github.com/rhysd/actionlint"
  - "https://rhysd.github.io/actionlint"
license:
  - "MIT"  
maintainer:
  - "Azathothas (https://github.com/Azathothas)"
note:
  - "[DO NOT RUN] (Meant for pkgforge CI Only)"
  - "Pre Built Binary Fetched from Upstream. Check/Report @ https://github.com/rhysd/actionlint"  
repology:
  - "actionlint"
src_url:
  - "https://github.com/rhysd/actionlint"
tag:
  - "utility"
  - "actions"
  - "ci"
  - "github-actions"
x_exec:
  host:
    - "aarch64-Linux"
    - "x86_64-Linux"
  shell: "bash"
  pkgver: |
    curl -qfsSL "https://api.gh.pkgforge.dev/repos/rhysd/actionlint/releases?per_page=100" | jq -r '[.[] | select(.draft == false)] | .[0].tag_name | gsub("\\s+"; "")' | tr -d '[:space:]'
  run: |
    #Tag
    RELEASE_TAG="$(cat ./${SBUILD_PKG}.version)"
    #Download
    case "$(uname -m)" in
      aarch64)
        soar dl "https://github.com/rhysd/actionlint@${RELEASE_TAG}" --match "linux,arm64,tar" --exclude "amd64,x86,x64" -o "${SBUILD_TMPDIR}/${SBUILD_PKG}.archive" --yes
        ;;
      x86_64)
        soar dl "https://github.com/rhysd/actionlint@${RELEASE_TAG}" --match "linux,amd64,tar" --exclude "aarch,arm,i386,i686" -o "${SBUILD_TMPDIR}/${SBUILD_PKG}.archive" --yes
        ;;
    esac
    #Extract
    while ARCHIVE_EXT="$(find "${SBUILD_TMPDIR}" -type f -print0 | xargs -0 file | grep -E "archive|compressed" | cut -d: -f1 | head -n1)"; [ -n "${ARCHIVE_EXT}" ]; do 7z e "${ARCHIVE_EXT}" -o"${SBUILD_TMPDIR}/." -y && rm "${ARCHIVE_EXT}"; done
    #Copy
    find "${SBUILD_TMPDIR}" -maxdepth 1 -type f -exec file -i "{}" \; | grep "application/.*executable" | cut -d":" -f1 | xargs realpath | xargs -I "{}" rsync -achvL "{}" "${SBUILD_OUTDIR}"