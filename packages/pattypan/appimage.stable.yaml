#!/SBUILD
_disabled: false

pkg: "pattypan"
pkg_id: "pkgforge-dev.pattypan"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/pattypan"
category:
  - "Network"
  - "Utility"
description: "Unofficial AppImage of Pattypan [Maintainer=@Samueru-sama]"
homepage:
  - "https://github.com/yarl/pattypan"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://raw.githubusercontent.com/yarl/pattypan/refs/heads/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Pattypan-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "pattypan"
repology:
  - "pattypan"
src_url:
  - "https://github.com/pkgforge-dev/Pattypan-AppImage"
tag:
  - "wikimedia"
  - "uploader"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Pattypan-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}" | sed "s/^v//"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Pattypan-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
