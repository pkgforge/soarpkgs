#!/SBUILD
_disabled: false

pkg: "orcaslicer"
pkg_id: "pkgforge-dev.orcaslicer"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/orcaslicer"
app_id: "com.softfever.OrcaSlicer"
category:
  - "3DGraphics"
  - "Utility"
description: "Open source slicer for FDM 3D printers, forked from Bambu Studio"
homepage:
  - "https://github.com/OrcaSlicer/OrcaSlicer"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "AGPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/OrcaSlicer/OrcaSlicer/refs/heads/main/LICENSE.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/OrcaSlicer-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "orcaslicer"
repology:
  - "orcaslicer"
src_url:
  - "https://github.com/pkgforge-dev/OrcaSlicer-AppImage-Enhanced"
tag:
  - "3d-printing"
  - "slicer"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/OrcaSlicer-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/OrcaSlicer-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
