#!/SBUILD
_disabled: false

pkg: "nugget-doom"
pkg_id: "pkgforge-dev.nugget-doom"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/nugget-doom"
category:
  - "Game"
  - "ActionGame"
description: "Doom source port forked from Woof! with additional features"
homepage:
  - "https://github.com/MrAlaux/Nugget-Doom"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0-or-later"
build_asset:
  - url: "https://raw.githubusercontent.com/MrAlaux/Nugget-Doom/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Nugget-Doom-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "nugget-doom"
repology:
  - "nugget-doom"
src_url:
  - "https://github.com/pkgforge-dev/Nugget-Doom-AppImage-Enhanced"
tag:
  - "doom"
  - "game"
  - "source-port"
  - "fps"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Nugget-Doom-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Nugget-Doom-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
