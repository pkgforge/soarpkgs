#!/SBUILD
_disabled: false

pkg: "dwarf-fortress"
pkg_id: "pkgforge-dev.dwarf-fortress"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/dwarf-fortress"
category:
  - "Game"
  - "StrategyGame"
  - "RolePlaying"
description: "Single-player fantasy construction and management roguelike by Bay 12 Games"
homepage:
  - "https://www.bay12games.com/dwarves/"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "Proprietary"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Dwarf-Fortress-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "dwarf-fortress"
repology:
  - "dwarf-fortress"
src_url:
  - "https://github.com/pkgforge-dev/Dwarf-Fortress-AppImage"
tag:
  - "game"
  - "roguelike"
  - "strategy"
  - "simulation"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Dwarf-Fortress-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Dwarf-Fortress-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
