#!/SBUILD
_disabled: false

pkg: "clownmdemu"
pkg_id: "pkgforge-dev.clownmdemu"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/clownmdemu"
category:
  - "Emulator"
  - "Game"
description: "Sega Mega Drive/Genesis emulator with reference standalone frontend"
homepage:
  - "https://clownacy.wordpress.com/tag/clownmdemu/"
  - "https://github.com/Clownacy/clownmdemu-frontend"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "AGPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/Clownacy/clownmdemu-frontend/master/LICENCE.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/ClownMDEmu-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "clownmdemu"
src_url:
  - "https://github.com/pkgforge-dev/ClownMDEmu-AppImage"
tag:
  - "emulator"
  - "sega"
  - "genesis"
  - "megadrive"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/ClownMDEmu-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/ClownMDEmu-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
