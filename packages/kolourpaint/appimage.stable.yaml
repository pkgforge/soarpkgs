#!/SBUILD
_disabled: false

pkg: "kolourpaint"
pkg_id: "pkgforge-dev.kolourpaint"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/kolourpaint"
category:
  - "Graphics"
  - "RasterGraphics"
  - "2DGraphics"
description: "Easy-to-use paint program for KDE"
homepage:
  - "https://apps.kde.org/kolourpaint"
  - "https://invent.kde.org/graphics/kolourpaint"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "BSD-2-Clause"
  - "LGPL-2.0-or-later"
build_asset:
  - url: "https://invent.kde.org/graphics/kolourpaint/-/raw/master/LICENSES/BSD-2-Clause.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/KolourPaint-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "kolourpaint"
repology:
  - "kolourpaint"
src_url:
  - "https://github.com/pkgforge-dev/KolourPaint-AppImage"
tag:
  - "paint"
  - "graphics"
  - "kde"
  - "raster"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/KolourPaint-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/KolourPaint-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
