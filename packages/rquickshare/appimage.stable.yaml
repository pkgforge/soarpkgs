#!/SBUILD
_disabled: false

pkg: "rquickshare"
pkg_id: "pkgforge-dev.rquickshare"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/rquickshare"
category:
  - "FileTransfer"
  - "Network"
  - "Utility"
description: "Rust implementation of NearbyShare/QuickShare from Android for Linux"
homepage:
  - "https://github.com/Martichou/rquickshare"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/Martichou/rquickshare/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/rquickshare-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "rquickshare"
repology:
  - "rquickshare"
src_url:
  - "https://github.com/pkgforge-dev/rquickshare-AppImage-Enhanced"
tag:
  - "file-transfer"
  - "nearby-share"
  - "quick-share"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/rquickshare-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/rquickshare-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
