#!/SBUILD
_disabled: false

pkg: "spek"
pkg_id: "pkgforge-dev.spek"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/spek"
category:
  - "Audio"
  - "AudioVideo"
description: "Acoustic spectrum analyser"
homepage:
  - "http://spek.cc"
  - "https://github.com/alexkay/spek"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/alexkay/spek/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Spek-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "spek"
repology:
  - "spek"
src_url:
  - "https://github.com/pkgforge-dev/Spek-AppImage"
tag:
  - "audio"
  - "spectrum"
  - "spectrogram"
  - "analyser"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Spek-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Spek-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
