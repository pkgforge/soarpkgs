#!/SBUILD
_disabled: false

pkg: "scummvm"
pkg_id: "pkgforge-dev.scummvm"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/scummvm"
category:
  - "Game"
  - "AdventureGame"
  - "Emulator"
description: "Interpreter to run classic point-and-click adventure and RPG games"
homepage:
  - "https://www.scummvm.org"
  - "https://github.com/scummvm/scummvm"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0-or-later"
build_asset:
  - url: "https://raw.githubusercontent.com/scummvm/scummvm/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/ScummVM-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "scummvm"
repology:
  - "scummvm"
src_url:
  - "https://github.com/pkgforge-dev/ScummVM-AppImage"
tag:
  - "games"
  - "adventure"
  - "emulator"
  - "point-and-click"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/ScummVM-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/ScummVM-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
