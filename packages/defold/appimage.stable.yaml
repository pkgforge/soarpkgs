#!/SBUILD
_disabled: false

pkg: "defold"
pkg_id: "pkgforge-dev.defold"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/defold"
category:
  - "Development"
  - "Game"
description: "Game engine for development of desktop, mobile and web games"
homepage:
  - "https://defold.com"
  - "https://github.com/defold/defold"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "Custom"
build_asset:
  - url: "https://raw.githubusercontent.com/defold/defold/dev/LICENSE.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Defold-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "defold"
repology:
  - "defold"
src_url:
  - "https://github.com/pkgforge-dev/Defold-AppImage"
tag:
  - "game-engine"
  - "gamedev"
  - "editor"
  - "ide"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Defold-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Defold-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
