#!/SBUILD
_disabled: false

pkg: "appimagetool"
pkg_id: "pkgforge-dev.appimagetool"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/appimagetool"
category:
  - "Utility"
  - "Development"
description: "Rust implementation of appimagetool for the Anylinux-AppImages project"
homepage:
  - "https://github.com/pkgforge-dev/appimagetool"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://raw.githubusercontent.com/pkgforge-dev/appimagetool/main/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/appimagetool"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "appimagetool"
repology:
  - "appimagetool"
src_url:
  - "https://github.com/pkgforge-dev/appimagetool"
tag:
  - "appimage"
  - "packaging"
  - "dwarfs"
  - "rust"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/appimagetool/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/appimagetool@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
