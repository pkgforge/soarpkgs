#!/SBUILD
_disabled: false

pkg: "drally"
pkg_id: "pkgforge-dev.drally"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/drally"
category:
  - "Game"
  - "ArcadeGame"
  - "ActionGame"
description: "Open source game engine remake of Death Rally (1996)"
homepage:
  - "https://github.com/urxp/dRally"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://raw.githubusercontent.com/urxp/dRally/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/dRally-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "drally"
repology:
  - "drally"
src_url:
  - "https://github.com/pkgforge-dev/dRally-AppImage"
tag:
  - "game"
  - "racing"
  - "death-rally"
  - "engine"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/dRally-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/dRally-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
