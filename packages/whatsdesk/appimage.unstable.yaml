#!/SBUILD
_disabled: false

pkg: "whatsdesk"
pkg_id: "pkgforge-dev.whatsdesk"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/whatsdesk"
category:
  - "Network"
  - "InstantMessaging"
  - "Chat"
description: "Unofficial WhatsApp desktop client built with Electron"
homepage:
  - "https://gitlab.com/zerkc/whatsdesk"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://gitlab.com/zerkc/whatsdesk/-/raw/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/WhatsDesk-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "whatsdesk"
repology:
  - "whatsdesk"
src_url:
  - "https://github.com/pkgforge-dev/WhatsDesk-AppImage"
tag:
  - "whatsapp"
  - "messaging"
  - "chat"
  - "electron"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION="HEAD-$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/WhatsDesk-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')"
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/WhatsDesk-AppImage@${REMOTE_PKGVER#HEAD-}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
