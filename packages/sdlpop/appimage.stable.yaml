#!/SBUILD
_disabled: false

pkg: "sdlpop"
pkg_id: "pkgforge-dev.sdlpop"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/sdlpop"
category:
  - "Game"
  - "AdventureGame"
  - "ActionGame"
description: "Open-source port of the classic Prince of Persia game"
homepage:
  - "https://github.com/NagyD/SDLPoP"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/NagyD/SDLPoP/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/SDLPoP-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "sdlpop"
repology:
  - "sdlpop"
src_url:
  - "https://github.com/pkgforge-dev/SDLPoP-AppImage"
tag:
  - "prince-of-persia"
  - "platformer"
  - "game"
  - "port"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/SDLPoP-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/SDLPoP-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
