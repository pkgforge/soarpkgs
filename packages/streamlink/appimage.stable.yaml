#!/SBUILD
_disabled: false

pkg: "streamlink"
pkg_id: "pkgforge-dev.streamlink"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/streamlink"
category:
  - "AudioVideo"
  - "Video"
  - "Network"
description: "CLI utility that pipes video streams from various services into a video player"
homepage:
  - "https://streamlink.github.io/"
  - "https://github.com/streamlink/streamlink"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "BSD-2-Clause"
build_asset:
  - url: "https://raw.githubusercontent.com/streamlink/streamlink/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Streamlink-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "streamlink"
repology:
  - "streamlink"
src_url:
  - "https://github.com/pkgforge-dev/Streamlink-AppImage"
tag:
  - "streaming"
  - "video"
  - "cli"
  - "player"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Streamlink-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Streamlink-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
