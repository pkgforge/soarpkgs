#!/SBUILD
_disabled: false

pkg: "kid3"
pkg_id: "pkgforge-dev.kid3"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/kid3"
category:
  - "Audio"
  - "Utility"
description: "Efficient audio tag editor supporting a large variety of file formats"
homepage:
  - "https://kid3.kde.org"
  - "https://invent.kde.org/multimedia/kid3"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0-or-later"
build_asset:
  - url: "https://invent.kde.org/multimedia/kid3/-/raw/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Kid3-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "kid3"
repology:
  - "kid3"
src_url:
  - "https://github.com/pkgforge-dev/Kid3-AppImage"
tag:
  - "audio"
  - "tagging"
  - "metadata"
  - "kde"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Kid3-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Kid3-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
