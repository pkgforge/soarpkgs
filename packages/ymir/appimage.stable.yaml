#!/SBUILD
_disabled: false

pkg: "ymir"
pkg_id: "pkgforge-dev.ymir"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/ymir"
category:
  - "Emulator"
  - "Game"
description: "Sega Saturn emulator"
homepage:
  - "https://github.com/StrikerX3/Ymir"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/StrikerX3/Ymir/main/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Ymir-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "ymir"
repology:
  - "ymir"
src_url:
  - "https://github.com/pkgforge-dev/Ymir-AppImage"
tag:
  - "emulator"
  - "saturn"
  - "sega"
  - "gaming"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Ymir-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Ymir-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
