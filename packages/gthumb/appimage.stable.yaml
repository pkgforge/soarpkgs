#!/SBUILD
_disabled: false

pkg: "gthumb"
pkg_id: "pkgforge-dev.gthumb"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/gthumb"
category:
  - "Graphics"
  - "Viewer"
  - "Photography"
description: "Image viewer and browser for the GNOME desktop"
homepage:
  - "https://apps.gnome.org/gThumb"
  - "https://gitlab.gnome.org/GNOME/gthumb"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0-or-later"
build_asset:
  - url: "https://gitlab.gnome.org/GNOME/gthumb/-/raw/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/gThumb-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "gthumb"
repology:
  - "gthumb"
src_url:
  - "https://github.com/pkgforge-dev/gThumb-AppImage"
tag:
  - "image-viewer"
  - "photography"
  - "graphics"
  - "gnome"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/gThumb-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/gThumb-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
