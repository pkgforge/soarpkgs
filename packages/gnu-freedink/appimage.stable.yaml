#!/SBUILD
_disabled: false

pkg: "gnu-freedink"
pkg_id: "pkgforge-dev.gnu-freedink"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/gnu-freedink"
category:
  - "Game"
  - "RolePlaying"
  - "AdventureGame"
description: "Free reimplementation of the Dink Smallwood adventure and role-playing game engine"
homepage:
  - "https://www.gnu.org/software/freedink/"
  - "https://git.savannah.gnu.org/cgit/freedink.git"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://cgit.git.savannah.gnu.org/cgit/freedink.git/plain/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/GNU-FreeDink-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "gnu-freedink"
repology:
  - "freedink"
src_url:
  - "https://github.com/pkgforge-dev/GNU-FreeDink-AppImage"
tag:
  - "game"
  - "rpg"
  - "adventure"
  - "dink"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/GNU-FreeDink-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/GNU-FreeDink-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
