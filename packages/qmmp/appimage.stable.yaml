#!/SBUILD
_disabled: false

pkg: "qmmp"
pkg_id: "pkgforge-dev.qmmp"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/qmmp"
category:
  - "Audio"
  - "Music"
  - "Player"
description: "Qt-based multimedia audio player with a Winamp/XMMS-style skinnable interface"
homepage:
  - "https://qmmp.ylsoftware.com"
  - "https://github.com/Greedysky/qmmp"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0-or-later"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Qmmp-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "qmmp"
repology:
  - "qmmp"
src_url:
  - "https://github.com/pkgforge-dev/Qmmp-AppImage"
tag:
  - "audio"
  - "music"
  - "player"
  - "qt"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Qmmp-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Qmmp-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
