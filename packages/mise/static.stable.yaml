#!/SBUILD
_disabled: false

pkg: "mise"
pkg_id: "jdx.mise"
remote_pkgver: "v2026.3.9"
pkg_type: "static"
ghcr_pkg: "jdx/mise"
category:
  - "Development"
  - "Utility"
description: "The front-end to your dev env"
homepage:
  - "https://mise.jdx.dev"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
note:
  - "Official binary from https://github.com/jdx/mise"
  - "[PORTABLE] (Portable Static Binary)"
  - "[NO_DESKTOP_INTEGRATION]"
provides:
  - "mise"
repology:
  - "mise"
src_url:
  - "https://github.com/jdx/mise"
tag:
  - "dev-tools"
  - "cli"
  - "utility"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    curl -qfsSL "https://api.github.com/repos/jdx/mise/releases/latest" | jq -r '.tag_name' | tr -d 'v'
  run: |
    case "${ARCH}" in
      aarch64) ARCH="arm64" ;;
      x86_64) ARCH="x64" ;;
    esac
    soar dl "github:jdx/mise@v${PKGVER}" --glob "*linux-${ARCH}-musl.tar.xz" -o "./mise.tar.xz" --yes
    tar -xf "mise.tar.xz" -C "$SBUILD_TMPDIR/"
    mv "$SBUILD_TMPDIR/mise/bin/mise" "$SBUILD_OUTDIR/$PKG"
    mv "$SBUILD_TMPDIR/mise/LICENSE" "$SBUILD_OUTDIR/"
    rm -f "mise.tar.xz"
