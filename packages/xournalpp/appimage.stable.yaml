#!/SBUILD
_disabled: false

pkg: "xournalpp"
pkg_id: "pkgforge-dev.xournalpp"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/xournalpp"
category:
  - "Office"
  - "Graphics"
  - "Utility"
description: "Handwriting notetaking software with PDF annotation support"
homepage:
  - "https://xournalpp.github.io"
  - "https://github.com/xournalpp/xournalpp"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0-or-later"
build_asset:
  - url: "https://raw.githubusercontent.com/xournalpp/xournalpp/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/xournalpp-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "xournalpp"
repology:
  - "xournalpp"
src_url:
  - "https://github.com/pkgforge-dev/xournalpp-AppImage-Enhanced"
tag:
  - "notetaking"
  - "handwriting"
  - "pdf"
  - "annotation"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/xournalpp-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/xournalpp-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
