#!/SBUILD
_disabled: false

pkg: "kega-fusion"
pkg_id: "pkgforge-dev.kega-fusion"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/kega-fusion"
category:
  - "Emulator"
  - "Game"
description: "Emulator for classic Sega consoles (Genesis, Master System, Game Gear, SegaCD, 32X)"
homepage:
  - "https://www.carpeludum.com/kega-fusion/"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "Proprietary"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Kega-Fusion-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "kega-fusion"
repology:
  - "kega-fusion"
src_url:
  - "https://github.com/pkgforge-dev/Kega-Fusion-AppImage"
tag:
  - "emulator"
  - "sega"
  - "genesis"
  - "gaming"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Kega-Fusion-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Kega-Fusion-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
