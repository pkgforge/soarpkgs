#!/SBUILD
_disabled: false

pkg: "flycast"
pkg_id: "pkgforge-dev.flycast"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/flycast"
category:
  - "Emulator"
  - "Game"
description: "Multi-platform Sega Dreamcast, Naomi, and Atomiswave emulator"
homepage:
  - "https://github.com/flyinghead/flycast"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/flyinghead/flycast/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Flycast-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "flycast"
repology:
  - "flycast"
src_url:
  - "https://github.com/pkgforge-dev/Flycast-AppImage-Enhanced"
tag:
  - "emulator"
  - "dreamcast"
  - "sega"
  - "naomi"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Flycast-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Flycast-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
