#!/SBUILD
_disabled: false

pkg: "simutrans"
pkg_id: "pkgforge-dev.simutrans"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/simutrans"
category:
  - "Game"
  - "Simulation"
  - "StrategyGame"
description: "Open-source transportation simulation game"
homepage:
  - "https://www.simutrans.com"
  - "https://github.com/simutrans/simutrans"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "Artistic-1.0"
build_asset:
  - url: "https://raw.githubusercontent.com/simutrans/simutrans/master/LICENSE.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Simutrans-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "simutrans"
repology:
  - "simutrans"
src_url:
  - "https://github.com/pkgforge-dev/Simutrans-AppImage"
tag:
  - "game"
  - "simulation"
  - "transport"
  - "strategy"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Simutrans-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Simutrans-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
