#!/SBUILD
_disabled: false

pkg: "hatari"
pkg_id: "pkgforge-dev.hatari"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/hatari"
category:
  - "Emulator"
  - "Game"
description: "Free Atari ST/STE/TT/Falcon emulator"
homepage:
  - "https://hatari.tuxfamily.org"
  - "https://github.com/hatari/hatari"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0-or-later"
build_asset:
  - url: "https://raw.githubusercontent.com/hatari/hatari/main/gpl.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Hatari-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "hatari"
repology:
  - "hatari"
src_url:
  - "https://github.com/pkgforge-dev/Hatari-AppImage"
tag:
  - "atari"
  - "emulator"
  - "st"
  - "falcon"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Hatari-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Hatari-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
