#!/SBUILD
_disabled: false

pkg: "dillo"
pkg_id: "pkgforge-dev.dillo"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/dillo"
category:
  - "Network"
  - "WebBrowser"
description: "Lightweight multi-platform graphical web browser built on FLTK"
homepage:
  - "https://dillo-browser.org"
  - "https://github.com/dillo-browser/dillo"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/dillo-browser/dillo/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Dillo-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "dillo"
repology:
  - "dillo"
src_url:
  - "https://github.com/pkgforge-dev/Dillo-AppImage"
tag:
  - "browser"
  - "web"
  - "lightweight"
  - "fltk"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Dillo-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Dillo-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
