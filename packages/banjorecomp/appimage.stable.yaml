#!/SBUILD
_disabled: false

pkg: "banjorecomp"
pkg_id: "pkgforge-dev.banjorecomp"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/banjorecomp"
category:
  - "Game"
  - "AdventureGame"
description: "PC port of Banjo-Kazooie built with N64: Recompiled"
homepage:
  - "https://github.com/BanjoRecomp/BanjoRecomp"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0-only"
build_asset:
  - url: "https://raw.githubusercontent.com/BanjoRecomp/BanjoRecomp/main/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/BanjoRecomp-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "banjorecomp"
repology:
  - "banjorecomp"
src_url:
  - "https://github.com/pkgforge-dev/BanjoRecomp-AppImage"
tag:
  - "game"
  - "n64"
  - "recompilation"
  - "banjo-kazooie"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/BanjoRecomp-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/BanjoRecomp-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
