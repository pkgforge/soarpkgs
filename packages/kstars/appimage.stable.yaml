#!/SBUILD
_disabled: false

pkg: "kstars"
pkg_id: "pkgforge-dev.kstars"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/kstars"
category:
  - "Science"
  - "Education"
description: "Desktop planetarium and astronomy suite for KDE"
homepage:
  - "https://apps.kde.org/kstars"
  - "https://invent.kde.org/education/kstars"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0-or-later"
build_asset:
  - url: "https://invent.kde.org/education/kstars/-/raw/master/LICENSES/GPL-2.0-or-later.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/KStars-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "kstars"
repology:
  - "kstars"
src_url:
  - "https://github.com/pkgforge-dev/KStars-AppImage"
tag:
  - "astronomy"
  - "planetarium"
  - "kde"
  - "science"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/KStars-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/KStars-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
