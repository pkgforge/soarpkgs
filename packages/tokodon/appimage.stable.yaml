#!/SBUILD
_disabled: false

pkg: "tokodon"
pkg_id: "pkgforge-dev.tokodon"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/tokodon"
app_id: "org.kde.tokodon"
category:
  - "Network"
  - "Chat"
description: "Mastodon client for Plasma and Plasma Mobile"
homepage:
  - "https://apps.kde.org/tokodon"
  - "https://invent.kde.org/network/tokodon"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0-or-later"
build_asset:
  - url: "https://invent.kde.org/network/tokodon/-/raw/master/LICENSES/GPL-3.0-or-later.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Tokodon-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "tokodon"
repology:
  - "tokodon"
src_url:
  - "https://github.com/pkgforge-dev/Tokodon-AppImage"
tag:
  - "mastodon"
  - "kde"
  - "fediverse"
  - "kirigami"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Tokodon-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Tokodon-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
