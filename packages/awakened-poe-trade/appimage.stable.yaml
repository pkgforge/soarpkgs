#!/SBUILD
_disabled: false

pkg: "awakened-poe-trade"
pkg_id: "pkgforge-dev.awakened-poe-trade"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/awakened-poe-trade"
category:
  - "Utility"
  - "Game"
description: "Path of Exile app for price checking and trading"
homepage:
  - "https://snosme.github.io/awakened-poe-trade/download"
  - "https://github.com/SnosMe/awakened-poe-trade"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://raw.githubusercontent.com/SnosMe/awakened-poe-trade/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Awakened-POE-Trade-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "awakened-poe-trade"
repology:
  - "awakened-poe-trade"
src_url:
  - "https://github.com/pkgforge-dev/Awakened-POE-Trade-AppImage-Enhanced"
tag:
  - "poe"
  - "trade"
  - "price-check"
  - "gaming"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Awakened-POE-Trade-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Awakened-POE-Trade-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
