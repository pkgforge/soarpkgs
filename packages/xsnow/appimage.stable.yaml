#!/SBUILD
_disabled: false

pkg: "xsnow"
pkg_id: "pkgforge-dev.xsnow"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/xsnow"
category:
  - "Amusement"
  - "Utility"
description: "Let it snow, with Santa and trees, on your desktop"
homepage:
  - "https://xsnow.sourceforge.io"
  - "https://sourceforge.net/projects/xsnow"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://sourceforge.net/p/xsnow/code/HEAD/tree/trunk/xsnow/COPYING?format=raw"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Xsnow-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "xsnow"
repology:
  - "xsnow"
src_url:
  - "https://github.com/pkgforge-dev/Xsnow-AppImage"
tag:
  - "snow"
  - "christmas"
  - "desktop"
  - "x11"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Xsnow-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Xsnow-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
