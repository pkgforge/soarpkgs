#!/SBUILD
_disabled: false

pkg: "raptor"
pkg_id: "pkgforge-dev.raptor"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/raptor"
category:
  - "Game"
  - "ArcadeGame"
  - "ActionGame"
description: "Source port of the classic vertical shooter Raptor: Call of the Shadows"
homepage:
  - "https://github.com/skynettx/raptor"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/skynettx/raptor/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Raptor-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "raptor"
src_url:
  - "https://github.com/pkgforge-dev/Raptor-AppImage"
tag:
  - "game"
  - "shoot-em-up"
  - "arcade"
  - "source-port"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Raptor-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Raptor-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
