#!/SBUILD
_disabled: false

pkg: "sonic-mania-decompilation"
pkg_id: "pkgforge-dev.sonic-mania-decompilation"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/sonic-mania-decompilation"
category:
  - "Game"
  - "ActionGame"
description: "A complete decompilation of Sonic Mania (2017), requires original game data"
homepage:
  - "https://github.com/RSDKModding/Sonic-Mania-Decompilation"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "Custom"
build_asset:
  - url: "https://raw.githubusercontent.com/RSDKModding/Sonic-Mania-Decompilation/master/LICENSE.md"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Sonic-Mania-Decompilation-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "sonic-mania-decompilation"
src_url:
  - "https://github.com/pkgforge-dev/Sonic-Mania-Decompilation-AppImage"
tag:
  - "sonic"
  - "decompilation"
  - "game"
  - "platformer"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Sonic-Mania-Decompilation-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Sonic-Mania-Decompilation-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
