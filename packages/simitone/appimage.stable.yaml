#!/SBUILD
_disabled: false

pkg: "simitone"
pkg_id: "pkgforge-dev.simitone"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/simitone"
category:
  - "Game"
  - "Simulation"
description: "Community re-implementation of The Sims 1, based on the FreeSO engine"
homepage:
  - "https://github.com/alexjyong/Simitone"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Simitone-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "simitone"
src_url:
  - "https://github.com/pkgforge-dev/Simitone-AppImage"
tag:
  - "game"
  - "sims"
  - "freeso"
  - "simulation"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Simitone-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Simitone-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
