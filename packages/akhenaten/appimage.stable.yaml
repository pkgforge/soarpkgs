#!/SBUILD
_disabled: false

pkg: "akhenaten"
pkg_id: "pkgforge-dev.akhenaten"
pkg_type: "appimage"
app_id: "com.github.dalerank.akhenaten"
ghcr_pkg: "pkgforge-dev/akhenaten"
category:
  - "Game"
  - "Simulation"
description: "Open source re-implementation of Pharaoh, the classic city builder"
homepage:
  - "https://github.com/dalerank/Akhenaten"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "AGPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/dalerank/Akhenaten/refs/heads/master/LICENSE.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Akhenaten-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "akhenaten"
repology:
  - "akhenaten"
src_url:
  - "https://github.com/pkgforge-dev/Akhenaten-AppImage"
tag:
  - "game"
  - "pharaoh"
  - "simulation"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Akhenaten-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Akhenaten-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
