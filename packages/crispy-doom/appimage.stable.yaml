#!/SBUILD
_disabled: false

pkg: "crispy-doom"
pkg_id: "pkgforge-dev.crispy-doom"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/crispy-doom"
category:
  - "Game"
  - "ActionGame"
description: "Limit-removing enhanced-resolution Doom source port based on Chocolate Doom"
homepage:
  - "https://github.com/fabiangreffrath/crispy-doom"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/fabiangreffrath/crispy-doom/master/COPYING.md"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Crispy-Doom-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "crispy-doom"
repology:
  - "crispy-doom"
src_url:
  - "https://github.com/pkgforge-dev/Crispy-Doom-AppImage"
tag:
  - "doom"
  - "fps"
  - "sourceport"
  - "game"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Crispy-Doom-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Crispy-Doom-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
