#!/SBUILD
_disabled: false

pkg: "readest"
pkg_id: "pkgforge-dev.readest"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/readest"
category:
  - "Office"
  - "Viewer"
  - "Utility"
description: "Modern, feature-rich ebook reader for avid readers"
homepage:
  - "https://readest.com"
  - "https://github.com/readest/readest"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "AGPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/readest/readest/main/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Readest-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "readest"
repology:
  - "readest"
src_url:
  - "https://github.com/pkgforge-dev/Readest-AppImage-Enhanced"
tag:
  - "ebook"
  - "reader"
  - "epub"
  - "books"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Readest-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Readest-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
