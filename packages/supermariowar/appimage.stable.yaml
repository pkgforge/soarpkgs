#!/SBUILD
_disabled: false

pkg: "supermariowar"
pkg_id: "pkgforge-dev.supermariowar"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/supermariowar"
category:
  - "Game"
  - "ArcadeGame"
  - "ActionGame"
description: "A fan-made multiplayer Super Mario Bros. style deathmatch game"
homepage:
  - "https://github.com/mmatyas/supermariowar"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0-or-later"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Supermariowar-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "supermariowar"
repology:
  - "supermariowar"
src_url:
  - "https://github.com/pkgforge-dev/Supermariowar-AppImage"
tag:
  - "game"
  - "multiplayer"
  - "arcade"
  - "platformer"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Supermariowar-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Supermariowar-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
