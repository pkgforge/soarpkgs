#!/SBUILD
_disabled: false

pkg: "godot"
pkg_id: "pkgforge-dev.godot"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/godot"
category:
  - "Development"
  - "Game"
description: "Advanced cross-platform 2D and 3D game engine"
homepage:
  - "https://godotengine.org"
  - "https://github.com/godotengine/godot"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://raw.githubusercontent.com/godotengine/godot/master/LICENSE.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Godot-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "godot"
repology:
  - "godot"
src_url:
  - "https://github.com/pkgforge-dev/Godot-AppImage"
tag:
  - "game-engine"
  - "game"
  - "godot"
  - "development"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Godot-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Godot-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
