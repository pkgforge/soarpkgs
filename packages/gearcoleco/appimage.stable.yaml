#!/SBUILD
_disabled: false

pkg: "gearcoleco"
pkg_id: "pkgforge-dev.gearcoleco"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/gearcoleco"
category:
  - "Emulator"
  - "Game"
description: "ColecoVision emulator and debugger"
homepage:
  - "https://github.com/drhelius/Gearcoleco"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/drhelius/Gearcoleco/main/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Gearcoleco-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "gearcoleco"
repology:
  - "gearcoleco"
src_url:
  - "https://github.com/pkgforge-dev/Gearcoleco-AppImage"
tag:
  - "colecovision"
  - "emulator"
  - "retro"
  - "gaming"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Gearcoleco-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Gearcoleco-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
