#!/SBUILD
_disabled: false

pkg: "tachoparser"
pkg_id: "pkgforge-dev.tachoparser"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/tachoparser"
category:
  - "Utility"
description: "Parser for tachograph files, supporting VU and driver card data"
homepage:
  - "https://github.com/traconiq/tachoparser"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "AGPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/traconiq/tachoparser/refs/heads/main/LICENSE.md"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/tachoparser-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "tachoparser"
src_url:
  - "https://github.com/pkgforge-dev/tachoparser-AppImage"
tag:
  - "tachograph"
  - "cli"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION="HEAD-$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/tachoparser-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')"
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/tachoparser-AppImage@${REMOTE_PKGVER#HEAD-}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
