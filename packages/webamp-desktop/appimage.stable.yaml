#!/SBUILD
_disabled: false

pkg: "webamp-desktop"
pkg_id: "pkgforge-dev.webamp-desktop"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/webamp-desktop"
category:
  - "Audio"
  - "Player"
  - "Music"
description: "Cross-platform desktop version of the Winamp 2.9 reimplementation Webamp"
homepage:
  - "https://github.com/durasj/webamp-desktop"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://raw.githubusercontent.com/durasj/webamp-desktop/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Webamp-Desktop-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "webamp-desktop"
src_url:
  - "https://github.com/pkgforge-dev/Webamp-Desktop-AppImage-Enhanced"
tag:
  - "webamp"
  - "winamp"
  - "audio"
  - "player"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Webamp-Desktop-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Webamp-Desktop-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
