#!/SBUILD
_disabled: false

pkg: "opengothic"
pkg_id: "pkgforge-dev.opengothic"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/opengothic"
category:
  - "Game"
  - "RolePlaying"
  - "AdventureGame"
description: "Open-source reimplementation of the Gothic 1/2 game engine"
homepage:
  - "https://github.com/Try/opengothic"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://raw.githubusercontent.com/Try/opengothic/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/OpenGothic-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "opengothic"
repology:
  - "opengothic"
src_url:
  - "https://github.com/pkgforge-dev/OpenGothic-AppImage"
tag:
  - "gothic"
  - "game"
  - "rpg"
  - "engine"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/OpenGothic-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/OpenGothic-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
