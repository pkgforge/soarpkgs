#!/SBUILD
_disabled: false

pkg: "supermodel"
pkg_id: "pkgforge-dev.supermodel"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/supermodel"
category:
  - "Emulator"
  - "Game"
description: "Official Sega Model 3 arcade machine emulator"
homepage:
  - "https://supermodel3.com"
  - "https://github.com/trzy/Supermodel"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/trzy/Supermodel/master/Docs/LICENSE.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Supermodel-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "supermodel"
repology:
  - "supermodel"
src_url:
  - "https://github.com/pkgforge-dev/Supermodel-AppImage"
tag:
  - "emulator"
  - "sega"
  - "arcade"
  - "model3"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Supermodel-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Supermodel-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
