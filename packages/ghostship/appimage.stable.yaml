#!/SBUILD
_disabled: false

pkg: "ghostship"
pkg_id: "pkgforge-dev.ghostship"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/ghostship"
category:
  - "Game"
description: "A native PC port of Super Mario 64 from Harbour Masters"
homepage:
  - "https://github.com/HarbourMasters/Ghostship"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://raw.githubusercontent.com/HarbourMasters/Ghostship/develop/LICENSE.md"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Ghostship-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "ghostship"
repology:
  - "ghostship"
src_url:
  - "https://github.com/pkgforge-dev/Ghostship-AppImage-Enhanced"
tag:
  - "game"
  - "super-mario-64"
  - "port"
  - "n64"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Ghostship-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Ghostship-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
