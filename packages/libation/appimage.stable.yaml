#!/SBUILD
_disabled: false

pkg: "libation"
pkg_id: "pkgforge-dev.libation"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/libation"
category:
  - "Audio"
  - "Utility"
  - "AudioVideo"
description: "Audible audiobook library manager and downloader"
homepage:
  - "https://getlibation.com"
  - "https://github.com/rmcrackan/Libation"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/rmcrackan/Libation/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Libation-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "libation"
repology:
  - "libation"
src_url:
  - "https://github.com/pkgforge-dev/Libation-AppImage"
tag:
  - "audible"
  - "audiobook"
  - "downloader"
  - "drm"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Libation-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Libation-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
