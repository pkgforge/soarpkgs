#!/SBUILD
_disabled: false

pkg: "cdogs-sdl"
pkg_id: "pkgforge-dev.cdogs-sdl"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/cdogs-sdl"
category:
  - "Game"
  - "ActionGame"
  - "ArcadeGame"
description: "Classic overhead run-and-gun game"
homepage:
  - "https://cxong.github.io/cdogs-sdl/"
  - "https://github.com/cxong/cdogs-sdl"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/cxong/cdogs-sdl/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/CDogs-SDL-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "cdogs-sdl"
repology:
  - "cdogs-sdl"
src_url:
  - "https://github.com/pkgforge-dev/CDogs-SDL-AppImage"
tag:
  - "shooter"
  - "arcade"
  - "action"
  - "game"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/CDogs-SDL-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/CDogs-SDL-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
