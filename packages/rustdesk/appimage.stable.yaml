#!/SBUILD
_disabled: false

pkg: "rustdesk"
pkg_id: "pkgforge-dev.rustdesk"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/rustdesk"
category:
  - "Network"
  - "Utility"
  - "RemoteAccess"
description: "Open-source remote desktop, a self-hosted alternative to TeamViewer"
homepage:
  - "https://rustdesk.com"
  - "https://github.com/rustdesk/rustdesk"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "AGPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/rustdesk/rustdesk/master/LICENCE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/RustDesk-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "rustdesk"
repology:
  - "rustdesk"
src_url:
  - "https://github.com/pkgforge-dev/RustDesk-AppImage-Enhanced"
tag:
  - "remote-desktop"
  - "remote-access"
  - "teamviewer"
  - "self-hosted"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/RustDesk-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/RustDesk-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
