#!/SBUILD
_disabled: false

pkg: "cubyz"
pkg_id: "pkgforge-dev.cubyz"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/cubyz"
category:
  - "Game"
  - "AdventureGame"
  - "3DGraphics"
description: "Voxel sandbox game with large render distance and procedurally generated content"
homepage:
  - "https://github.com/PixelGuys/Cubyz"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/PixelGuys/Cubyz/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Cubyz-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "cubyz"
repology:
  - "cubyz"
src_url:
  - "https://github.com/pkgforge-dev/Cubyz-AppImage"
tag:
  - "voxel"
  - "sandbox"
  - "game"
  - "zig"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Cubyz-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Cubyz-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
