#!/SBUILD
_disabled: false

pkg: "quantumlauncher"
pkg_id: "pkgforge-dev.quantumlauncher"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/quantumlauncher"
category:
  - "Game"
  - "Utility"
description: "A simple, powerful Minecraft launcher written in Rust"
homepage:
  - "https://mrmayman.github.io/quantumlauncher"
  - "https://github.com/Mrmayman/quantumlauncher"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/Mrmayman/quantumlauncher/main/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/QuantumLauncher-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "quantumlauncher"
repology:
  - "quantumlauncher"
src_url:
  - "https://github.com/pkgforge-dev/QuantumLauncher-AppImage-Enhanced"
tag:
  - "minecraft"
  - "launcher"
  - "game"
  - "rust"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/QuantumLauncher-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/QuantumLauncher-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
