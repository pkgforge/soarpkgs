#!/SBUILD
_disabled: false

pkg: "riseup-vpn"
pkg_id: "pkgforge-dev.riseup-vpn"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/riseup-vpn"
category:
  - "Network"
  - "Security"
description: "Easy, fast, and secure VPN client from riseup.net, based on LEAP/Bitmask"
homepage:
  - "https://riseup.net/vpn"
  - "https://0xacab.org/leap/bitmask-vpn"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://0xacab.org/leap/bitmask-vpn/-/raw/main/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Riseup-VPN-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "riseup-vpn"
repology:
  - "riseup-vpn"
src_url:
  - "https://github.com/pkgforge-dev/Riseup-VPN-AppImage"
tag:
  - "vpn"
  - "network"
  - "privacy"
  - "security"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Riseup-VPN-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Riseup-VPN-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
