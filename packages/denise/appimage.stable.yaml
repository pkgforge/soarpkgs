#!/SBUILD
_disabled: false

pkg: "denise"
pkg_id: "pkgforge-dev.denise"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/denise"
category:
  - "Emulator"
description: "Highly accurate C64 and Amiga emulator"
homepage:
  - "https://dnp.dev"
  - "https://bitbucket.org/piciji/denise"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0-or-later"
build_asset:
  - url: "https://bitbucket.org/piciji/denise/raw/master/licence.md"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Denise-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "denise"
repology:
  - "denise"
src_url:
  - "https://github.com/pkgforge-dev/Denise-AppImage"
tag:
  - "emulator"
  - "c64"
  - "amiga"
  - "commodore"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Denise-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Denise-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
