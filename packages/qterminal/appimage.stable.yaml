#!/SBUILD
_disabled: false

pkg: "qterminal"
pkg_id: "pkgforge-dev.qterminal"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/qterminal"
category:
  - "System"
  - "TerminalEmulator"
  - "Utility"
description: "Lightweight Qt-based terminal emulator for the LXQt desktop environment"
homepage:
  - "https://lxqt-project.org"
  - "https://github.com/lxqt/qterminal"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/lxqt/qterminal/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/QTerminal-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "qterminal"
repology:
  - "qterminal"
src_url:
  - "https://github.com/pkgforge-dev/QTerminal-AppImage"
tag:
  - "terminal"
  - "qt"
  - "lxqt"
  - "emulator"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/QTerminal-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/QTerminal-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
