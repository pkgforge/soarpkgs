#!/SBUILD
_disabled: false

pkg: "duckstation-gpl"
pkg_id: "pkgforge-dev.duckstation-gpl"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/duckstation-gpl"
category:
  - "Emulator"
  - "Game"
description: "Fast PlayStation 1 emulator for x86-64/AArch32/AArch64/RV64"
homepage:
  - "https://github.com/stenzek/duckstation"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/stenzek/duckstation/aa955b8ae28314ae061613f0ddf13183a98aca03/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/DuckStation-GPL-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "duckstation-gpl"
repology:
  - "duckstation"
src_url:
  - "https://github.com/pkgforge-dev/DuckStation-GPL-AppImage-Enhanced"
tag:
  - "emulator"
  - "playstation"
  - "ps1"
  - "gaming"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/DuckStation-GPL-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/DuckStation-GPL-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
