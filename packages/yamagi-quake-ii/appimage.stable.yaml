#!/SBUILD
_disabled: false

pkg: "yamagi-quake-ii"
pkg_id: "pkgforge-dev.yamagi-quake-ii"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/yamagi-quake-ii"
category:
  - "Game"
  - "ActionGame"
  - "Shooter"
description: "Enhanced Quake II source port with modern features and bug fixes"
homepage:
  - "https://www.yamagi.org/quake2"
  - "https://github.com/yquake2/yquake2"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/yquake2/yquake2/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Yamagi-Quake-II-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "yamagi-quake-ii"
repology:
  - "yamagi-quake2"
src_url:
  - "https://github.com/pkgforge-dev/Yamagi-Quake-II-AppImage"
tag:
  - "quake"
  - "fps"
  - "game"
  - "sourceport"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Yamagi-Quake-II-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Yamagi-Quake-II-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
