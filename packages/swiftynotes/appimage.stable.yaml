#!/SBUILD
_disabled: false

pkg: "swiftynotes"
pkg_id: "pkgforge-dev.swiftynotes"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/swiftynotes"
category:
  - "Utility"
  - "TextEditor"
  - "Office"
description: "Native GTK markdown notes for Linux and macOS, written in Swift"
homepage:
  - "https://github.com/makoni/swifty-notes-gtk"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://raw.githubusercontent.com/makoni/swifty-notes-gtk/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/swiftynotes-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "swiftynotes"
src_url:
  - "https://github.com/pkgforge-dev/swiftynotes-AppImage"
tag:
  - "notes"
  - "markdown"
  - "gtk"
  - "editor"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/swiftynotes-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/swiftynotes-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
