#!/SBUILD
_disabled: false

pkg: "starfox64recomp"
pkg_id: "pkgforge-dev.starfox64recomp"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/starfox64recomp"
category:
  - "Game"
  - "ActionGame"
  - "Shooter"
description: "Static recompilation of the Nintendo 64 game Star Fox 64"
homepage:
  - "https://github.com/sonicdcer/Starfox64Recomp"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0-only"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Starfox64Recomp-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "starfox64recomp"
repology:
  - "starfox64recomp"
src_url:
  - "https://github.com/pkgforge-dev/Starfox64Recomp-AppImage"
tag:
  - "game"
  - "star-fox"
  - "n64"
  - "recompilation"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Starfox64Recomp-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Starfox64Recomp-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
