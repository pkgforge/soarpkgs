#!/SBUILD
_disabled: false

pkg: "wine"
pkg_id: "pkgforge-dev.wine"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/wine"
category:
  - "System"
  - "Utility"
  - "Emulator"
description: "Compatibility layer to run Windows applications on POSIX systems"
homepage:
  - "https://www.winehq.org"
  - "https://github.com/wine-mirror/wine"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "LGPL-2.1-or-later"
build_asset:
  - url: "https://raw.githubusercontent.com/wine-mirror/wine/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/wine-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "wine"
repology:
  - "wine"
src_url:
  - "https://github.com/pkgforge-dev/wine-AppImage"
tag:
  - "wine"
  - "windows"
  - "compatibility"
  - "emulator"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/wine-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/wine-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
