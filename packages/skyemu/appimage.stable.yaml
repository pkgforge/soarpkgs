#!/SBUILD
_disabled: false

pkg: "skyemu"
pkg_id: "pkgforge-dev.skyemu"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/skyemu"
category:
  - "Emulator"
  - "Game"
description: "Game Boy Advance, Game Boy, Game Boy Color, and Nintendo DS emulator"
homepage:
  - "https://skyemu.app"
  - "https://github.com/skylersaleh/SkyEmu"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://raw.githubusercontent.com/skylersaleh/SkyEmu/dev/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/SkyEmu-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "skyemu"
repology:
  - "skyemu"
src_url:
  - "https://github.com/pkgforge-dev/SkyEmu-AppImage"
tag:
  - "emulator"
  - "gameboy"
  - "gba"
  - "nintendo-ds"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/SkyEmu-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/SkyEmu-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
