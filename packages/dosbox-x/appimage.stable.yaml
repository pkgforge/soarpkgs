#!/SBUILD
_disabled: false

pkg: "dosbox-x"
pkg_id: "pkgforge-dev.dosbox-x"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/dosbox-x"
category:
  - "Emulator"
  - "Game"
  - "System"
description: "Cross-platform DOS emulator, a fork of the DOSBox project"
homepage:
  - "https://dosbox-x.com"
  - "https://github.com/joncampbell123/dosbox-x"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/joncampbell123/dosbox-x/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/DOSBox-X-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "dosbox-x"
repology:
  - "dosbox-x"
src_url:
  - "https://github.com/pkgforge-dev/DOSBox-X-AppImage"
tag:
  - "dos"
  - "emulator"
  - "dosbox"
  - "retro"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/DOSBox-X-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/DOSBox-X-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
