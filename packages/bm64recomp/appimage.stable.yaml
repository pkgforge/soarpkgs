#!/SBUILD
_disabled: false

pkg: "bm64recomp"
pkg_id: "pkgforge-dev.bm64recomp"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/bm64recomp"
category:
  - "Game"
  - "ActionGame"
description: "Static recompilation of the Nintendo 64 game Bomberman 64"
homepage:
  - "https://github.com/RevoSucks/BM64Recomp"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/RevoSucks/BM64Recomp/master/LICENSE.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/BM64Recomp-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "bm64recomp"
src_url:
  - "https://github.com/pkgforge-dev/BM64Recomp-AppImage-Enhanced"
tag:
  - "game"
  - "n64"
  - "recompilation"
  - "bomberman"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/BM64Recomp-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/BM64Recomp-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
