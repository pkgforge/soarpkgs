#!/SBUILD
_disabled: false

pkg: "solaar"
pkg_id: "pkgforge-dev.solaar"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/solaar"
category:
  - "Utility"
  - "System"
  - "HardwareSettings"
description: "Linux device manager for Logitech devices (Unifying receivers, mice, keyboards)"
homepage:
  - "https://github.com/pwr-Solaar/Solaar"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/pwr-Solaar/Solaar/master/LICENSE.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Solaar-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "solaar"
repology:
  - "solaar"
src_url:
  - "https://github.com/pkgforge-dev/Solaar-AppImage"
tag:
  - "logitech"
  - "unifying"
  - "device-manager"
  - "hardware"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Solaar-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Solaar-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
