#!/SBUILD
_disabled: false

pkg: "tauon"
pkg_id: "pkgforge-dev.tauon"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/tauon"
app_id: "com.github.taiko2k.tauonmb"
category:
  - "Audio"
  - "Music"
  - "Player"
description: "The music player of today, a sleek and modern desktop audio player"
homepage:
  - "https://tauonmusicbox.rocks"
  - "https://github.com/Taiko2k/Tauon"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/Taiko2k/Tauon/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Tauon-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "tauon"
repology:
  - "tauon-music-box"
src_url:
  - "https://github.com/pkgforge-dev/Tauon-AppImage"
tag:
  - "music"
  - "player"
  - "audio"
  - "desktop"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Tauon-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Tauon-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
