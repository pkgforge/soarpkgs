#!/SBUILD
_disabled: false

pkg: "nestopia"
pkg_id: "pkgforge-dev.nestopia"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/nestopia"
category:
  - "Emulator"
  - "Game"
description: "Cross-platform NES/Famicom emulator with a GUI"
homepage:
  - "https://github.com/0ldsk00l/nestopia"
  - "http://0ldsk00l.ca/nestopia"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/0ldsk00l/nestopia/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Nestopia-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "nestopia"
repology:
  - "nestopia"
src_url:
  - "https://github.com/pkgforge-dev/Nestopia-AppImage"
tag:
  - "emulator"
  - "nes"
  - "famicom"
  - "games"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Nestopia-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Nestopia-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
