#!/SBUILD
_disabled: false

pkg: "iris"
pkg_id: "pkgforge-dev.iris"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/iris"
category:
  - "Game"
  - "Emulator"
description: "Sony PlayStation 2 emulator for Windows, Linux and macOS"
homepage:
  - "https://github.com/allkern/iris"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://raw.githubusercontent.com/allkern/iris/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Iris-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "iris"
src_url:
  - "https://github.com/pkgforge-dev/Iris-AppImage-Enhanced"
tag:
  - "playstation2"
  - "emulator"
  - "ps2"
  - "gaming"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Iris-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Iris-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
