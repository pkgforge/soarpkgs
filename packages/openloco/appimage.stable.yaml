#!/SBUILD
_disabled: false

pkg: "openloco"
pkg_id: "pkgforge-dev.openloco"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/openloco"
category:
  - "Game"
  - "StrategyGame"
  - "Simulation"
description: "Open source re-implementation of Chris Sawyer's Locomotion"
homepage:
  - "https://openloco.io"
  - "https://github.com/OpenLoco/OpenLoco"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://raw.githubusercontent.com/OpenLoco/OpenLoco/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/OpenLoco-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "openloco"
repology:
  - "openloco"
src_url:
  - "https://github.com/pkgforge-dev/OpenLoco-AppImage"
tag:
  - "game"
  - "simulation"
  - "transport"
  - "strategy"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/OpenLoco-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/OpenLoco-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
