#!/SBUILD
_disabled: false

pkg: "gwenview"
pkg_id: "pkgforge-dev.gwenview"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/gwenview"
category:
  - "Graphics"
  - "Viewer"
  - "Photography"
description: "Image viewer by KDE"
homepage:
  - "https://apps.kde.org/gwenview"
  - "https://invent.kde.org/graphics/gwenview"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0-or-later"
build_asset:
  - url: "https://invent.kde.org/graphics/gwenview/-/raw/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Gwenview-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "gwenview"
repology:
  - "gwenview"
src_url:
  - "https://github.com/pkgforge-dev/Gwenview-AppImage"
tag:
  - "image"
  - "viewer"
  - "kde"
  - "photography"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Gwenview-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Gwenview-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
