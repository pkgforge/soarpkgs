#!/SBUILD
_disabled: false

pkg: "shockolate"
pkg_id: "pkgforge-dev.shockolate"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/shockolate"
category:
  - "Game"
  - "ActionGame"
  - "RolePlaying"
description: "Minimalist cross-platform System Shock source port"
homepage:
  - "https://github.com/Interrupt/systemshock"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/Interrupt/systemshock/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Shockolate-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "shockolate"
repology:
  - "shockolate"
src_url:
  - "https://github.com/pkgforge-dev/Shockolate-AppImage"
tag:
  - "system-shock"
  - "source-port"
  - "fps"
  - "game"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Shockolate-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Shockolate-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
