#!/SBUILD
_disabled: false

pkg: "imagemagick"
pkg_id: "pkgforge-dev.imagemagick"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/imagemagick"
category:
  - "Graphics"
  - "RasterGraphics"
  - "ImageProcessing"
description: "Software suite to create, edit, convert and display images in 200+ formats"
homepage:
  - "https://imagemagick.org"
  - "https://github.com/ImageMagick/ImageMagick"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "ImageMagick"
build_asset:
  - url: "https://raw.githubusercontent.com/ImageMagick/ImageMagick/main/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/ImageMagick-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "imagemagick"
repology:
  - "imagemagick"
src_url:
  - "https://github.com/pkgforge-dev/ImageMagick-AppImage"
tag:
  - "imagemagick"
  - "image"
  - "graphics"
  - "convert"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/ImageMagick-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/ImageMagick-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
