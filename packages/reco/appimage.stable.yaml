#!/SBUILD
_disabled: false

pkg: "reco"
pkg_id: "pkgforge-dev.reco"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/reco"
category:
  - "Audio"
  - "AudioVideo"
  - "Recorder"
description: "An audio recorder focused on being concise and simple to use"
homepage:
  - "https://github.com/ryonakano/reco"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/ryonakano/reco/main/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Reco-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "reco"
repology:
  - "reco"
src_url:
  - "https://github.com/pkgforge-dev/Reco-AppImage"
tag:
  - "audio"
  - "recorder"
  - "gnome"
  - "elementary"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Reco-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Reco-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
