#!/SBUILD
_disabled: false

pkg: "pdf-arranger"
pkg_id: "pkgforge-dev.pdf-arranger"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/pdf-arranger"
app_id: "com.github.jeromerobert.pdfarranger"
category:
  - "Office"
  - "Utility"
description: "Unofficial AppImage of PDF Arranger [Maintainer=@Samueru-sama]"
homepage:
  - "https://github.com/jeromerobert/pdfarranger"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/jeromerobert/pdfarranger/refs/heads/main/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/PDF-Arranger-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "pdf-arranger"
repology:
  - "pdfarranger"
src_url:
  - "https://github.com/pkgforge-dev/PDF-Arranger-AppImage"
tag:
  - "pdf"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/PDF-Arranger-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/PDF-Arranger-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
