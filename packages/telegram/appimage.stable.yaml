#!/SBUILD
_disabled: false

pkg: "telegram"
pkg_id: "pkgforge-dev.telegram"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/telegram"
app_id: "org.telegram.desktop"
category:
  - "Network"
  - "InstantMessaging"
  - "Chat"
description: "Official Telegram Desktop messaging client"
homepage:
  - "https://desktop.telegram.org/"
  - "https://github.com/telegramdesktop/tdesktop"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/telegramdesktop/tdesktop/dev/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Telegram-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "telegram"
repology:
  - "telegram-desktop"
src_url:
  - "https://github.com/pkgforge-dev/Telegram-AppImage"
tag:
  - "telegram"
  - "messaging"
  - "chat"
  - "instant-messaging"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Telegram-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Telegram-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
