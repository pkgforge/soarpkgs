#!/SBUILD
_disabled: false

pkg: "isle-portable"
pkg_id: "pkgforge-dev.isle-portable"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/isle-portable"
category:
  - "Game"
  - "AdventureGame"
description: "A portable/cross-platform build of the LEGO Island (1997) decompilation"
homepage:
  - "https://github.com/isledecomp/isle-portable"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "LGPL-3.0-or-later"
build_asset:
  - url: "https://raw.githubusercontent.com/isledecomp/isle-portable/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/isle-portable-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "isle-portable"
repology:
  - "isle-portable"
src_url:
  - "https://github.com/pkgforge-dev/isle-portable-AppImage-Enhanced"
tag:
  - "lego"
  - "island"
  - "game"
  - "decompilation"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/isle-portable-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/isle-portable-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
