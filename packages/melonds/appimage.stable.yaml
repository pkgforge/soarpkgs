#!/SBUILD
_disabled: false

pkg: "melonds"
pkg_id: "pkgforge-dev.melonds"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/melonds"
category:
  - "Emulator"
  - "Game"
description: "Nintendo DS emulator focused on accuracy, features and portability"
homepage:
  - "https://melonds.kuribo64.net"
  - "https://github.com/melonDS-emu/melonDS"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/melonDS-emu/melonDS/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/melonDS-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "melonds"
repology:
  - "melonds"
src_url:
  - "https://github.com/pkgforge-dev/melonDS-AppImage-Enhanced"
tag:
  - "emulator"
  - "nintendo-ds"
  - "ds"
  - "gaming"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/melonDS-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/melonDS-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
