#!/SBUILD
_disabled: false

pkg: "orcaslicer-enhanced"
pkg_id: "pkgforge-dev.orcaslicer-enhanced"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/orcaslicer-enhanced"
category:
  - "TODO"
description: "Improved AppImage of OrcaSlicer which is able to work on any linux system [Maintainer=@Samueru-sama]"
homepage:
  - "https://github.com/pkgforge-dev/OrcaSlicer-AppImage-Enhanced"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "TODO"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/OrcaSlicer-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "orcaslicer-enhanced"
repology:
  - "orcaslicer-enhanced"
src_url:
  - "https://github.com/pkgforge-dev/OrcaSlicer-AppImage-Enhanced"
tag:
  - "TODO"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/OrcaSlicer-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/OrcaSlicer-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
