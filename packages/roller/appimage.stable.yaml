#!/SBUILD
_disabled: false

pkg: "roller"
pkg_id: "pkgforge-dev.roller"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/roller"
category:
  - "Game"
  - "ArcadeGame"
description: "Reverse-engineered reimplementation of the 1995 racing game Whiplash/Fatal Racing"
homepage:
  - "https://github.com/FatalDecomp/ROLLER"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0-only"
build_asset:
  - url: "https://raw.githubusercontent.com/FatalDecomp/ROLLER/master/LICENSE.md"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/ROLLER-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "roller"
src_url:
  - "https://github.com/pkgforge-dev/ROLLER-AppImage"
tag:
  - "game"
  - "racing"
  - "decompilation"
  - "reverse-engineering"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/ROLLER-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/ROLLER-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
