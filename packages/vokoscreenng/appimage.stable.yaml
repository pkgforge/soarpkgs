#!/SBUILD
_disabled: false

pkg: "vokoscreenng"
pkg_id: "pkgforge-dev.vokoscreenng"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/vokoscreenng"
category:
  - "AudioVideo"
  - "Recorder"
  - "Video"
description: "Powerful screencast creator to record the screen, an area or a window"
homepage:
  - "https://github.com/vkohaupt/vokoscreenNG"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/vkohaupt/vokoscreenNG/3.0/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/vokoscreenNG-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "vokoscreenng"
repology:
  - "vokoscreen"
src_url:
  - "https://github.com/pkgforge-dev/vokoscreenNG-AppImage"
tag:
  - "screencast"
  - "recorder"
  - "screen-recording"
  - "video"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/vokoscreenNG-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/vokoscreenNG-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
