#!/SBUILD
_disabled: false

pkg: "rvgl"
pkg_id: "pkgforge-dev.rvgl"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/rvgl"
category:
  - "Game"
  - "ArcadeGame"
description: "A modern port of the classic 1999 R/C car racing game Re-Volt"
homepage:
  - "https://rvgl.org"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "Proprietary"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/RVGL-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "rvgl"
repology:
  - "rvgl"
src_url:
  - "https://github.com/pkgforge-dev/RVGL-AppImage"
tag:
  - "game"
  - "racing"
  - "re-volt"
  - "arcade"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/RVGL-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/RVGL-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
