#!/SBUILD
_disabled: false

pkg: "freac"
pkg_id: "pkgforge-dev.freac"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/freac"
category:
  - "Audio"
  - "AudioVideo"
  - "Utility"
description: "Free audio converter and CD ripper supporting many formats"
homepage:
  - "https://www.freac.org/"
  - "https://github.com/enzo1982/freac"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/enzo1982/freac/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/freac-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "freac"
repology:
  - "freac"
src_url:
  - "https://github.com/pkgforge-dev/freac-AppImage-Enhanced"
tag:
  - "audio"
  - "converter"
  - "cd-ripper"
  - "encoder"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/freac-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/freac-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
