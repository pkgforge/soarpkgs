#!/SBUILD
_disabled: false

pkg: "pyglossary"
pkg_id: "pkgforge-dev.pyglossary"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/pyglossary"
category:
  - "Utility"
  - "Education"
  - "Office"
description: "Tool for converting dictionary files and glossaries between various formats"
homepage:
  - "https://github.com/ilius/pyglossary"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0-or-later"
build_asset:
  - url: "https://raw.githubusercontent.com/ilius/pyglossary/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/PyGlossary-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "pyglossary"
repology:
  - "pyglossary"
src_url:
  - "https://github.com/pkgforge-dev/PyGlossary-AppImage"
tag:
  - "dictionary"
  - "glossary"
  - "converter"
  - "cli"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/PyGlossary-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/PyGlossary-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
