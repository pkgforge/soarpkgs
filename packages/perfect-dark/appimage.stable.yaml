#!/SBUILD
_disabled: false

pkg: "perfect-dark"
pkg_id: "pkgforge-dev.perfect-dark"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/perfect-dark"
app_id: "io.github.perfect_dark_pc_port.perfect_dark"
category:
  - "Game"
description: "Unofficial AppImage of Perfect Dark [Maintainer=@Link4Electronics]"
homepage:
  - "https://github.com/perfect-dark-pc-port/perfect_dark"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://raw.githubusercontent.com/perfect-dark-pc-port/perfect_dark/refs/heads/port/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Perfect-Dark-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "perfect-dark"
repology:
  - "perfect-dark"
src_url:
  - "https://github.com/pkgforge-dev/Perfect-Dark-AppImage"
tag:
  - "fps"
  - "n64"
  - "retro"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Perfect-Dark-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Perfect-Dark-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
