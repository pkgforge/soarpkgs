#!/SBUILD
_disabled: false

pkg: "nblood"
pkg_id: "pkgforge-dev.nblood"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/nblood"
category:
  - "Game"
  - "ActionGame"
description: "Source port of Blood based on the EDuke32/Build engine"
homepage:
  - "https://github.com/nukeykt/NBlood"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/nukeykt/NBlood/master/package/common/gpl-2.0.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/NBlood-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "nblood"
repology:
  - "nblood"
src_url:
  - "https://github.com/pkgforge-dev/NBlood-AppImage"
tag:
  - "blood"
  - "fps"
  - "source-port"
  - "build-engine"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/NBlood-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/NBlood-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
