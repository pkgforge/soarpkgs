#!/SBUILD
_disabled: false

pkg: "itgmania"
pkg_id: "pkgforge-dev.itgmania"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/itgmania"
category:
  - "Game"
  - "ArcadeGame"
  - "Music"
description: "A free, open source, and community-driven dance game"
homepage:
  - "https://www.itgmania.com/"
  - "https://github.com/itgmania/itgmania"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/itgmania/itgmania/release/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/ITGmania-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "itgmania"
repology:
  - "itgmania"
src_url:
  - "https://github.com/pkgforge-dev/ITGmania-AppImage"
tag:
  - "rhythm"
  - "dance"
  - "game"
  - "stepmania"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/ITGmania-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/ITGmania-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
