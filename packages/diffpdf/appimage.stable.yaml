#!/SBUILD
_disabled: false

pkg: "diffpdf"
pkg_id: "pkgforge-dev.diffpdf"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/diffpdf"
category:
  - "Utility"
  - "Office"
description: "Compare two PDF files visually or textually"
homepage:
  - "https://gitlab.com/eang/diffpdf"
  - "http://www.qtrac.eu/diffpdf-foss.html"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://gitlab.com/eang/diffpdf/-/raw/master/gpl-2.0.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/DiffPDF-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "diffpdf"
repology:
  - "diffpdf"
src_url:
  - "https://github.com/pkgforge-dev/DiffPDF-AppImage"
tag:
  - "pdf"
  - "diff"
  - "compare"
  - "viewer"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/DiffPDF-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/DiffPDF-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
