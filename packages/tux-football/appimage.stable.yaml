#!/SBUILD
_disabled: false

pkg: "tux-football"
pkg_id: "pkgforge-dev.tux-football"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/tux-football"
category:
  - "Game"
  - "SportsGame"
  - "ArcadeGame"
description: "Arcade-style 2D soccer game featuring Tux"
homepage:
  - "https://tuxfootball.sourceforge.net/"
  - "https://sourceforge.net/projects/tuxfootball/"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/OSSGames/GAME-SDL-SPORTS-TuxFootball/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Tux-Football-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "tux-football"
repology:
  - "tuxfootball"
src_url:
  - "https://github.com/pkgforge-dev/Tux-Football-AppImage"
tag:
  - "soccer"
  - "football"
  - "game"
  - "tux"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Tux-Football-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Tux-Football-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
