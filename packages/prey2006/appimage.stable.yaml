#!/SBUILD
_disabled: false

pkg: "prey2006"
pkg_id: "pkgforge-dev.prey2006"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/prey2006"
category:
  - "Game"
  - "ActionGame"
  - "Shooter"
description: "Prey 2006 SDK integrated with the Doom 3 GPL engine release"
homepage:
  - "https://github.com/FriskTheFallenHuman/Prey2006"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/FriskTheFallenHuman/Prey2006/main/.github/COPYING.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Prey2006-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "prey2006"
src_url:
  - "https://github.com/pkgforge-dev/Prey2006-AppImage"
tag:
  - "prey"
  - "fps"
  - "doom3"
  - "game"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Prey2006-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Prey2006-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
