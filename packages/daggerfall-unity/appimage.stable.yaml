#!/SBUILD
_disabled: false

pkg: "daggerfall-unity"
pkg_id: "pkgforge-dev.daggerfall-unity"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/daggerfall-unity"
category:
  - "Game"
  - "RolePlaying"
  - "AdventureGame"
description: "Open source recreation of Daggerfall in the Unity engine"
homepage:
  - "https://www.dfworkshop.net"
  - "https://github.com/Interkarma/daggerfall-unity"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://raw.githubusercontent.com/Interkarma/daggerfall-unity/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Daggerfall-Unity-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "daggerfall-unity"
repology:
  - "daggerfall-unity"
src_url:
  - "https://github.com/pkgforge-dev/Daggerfall-Unity-AppImage"
tag:
  - "game"
  - "rpg"
  - "daggerfall"
  - "unity"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Daggerfall-Unity-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Daggerfall-Unity-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
