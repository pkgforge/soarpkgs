#!/SBUILD
_disabled: false

pkg: "gradia"
pkg_id: "pkgforge-dev.gradia"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/gradia"
category:
  - "Graphics"
  - "Utility"
description: "Make your screenshots ready to share with backgrounds and annotations"
homepage:
  - "https://gradia.alexandervanhee.be"
  - "https://github.com/AlexanderVanhee/Gradia"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0-or-later"
build_asset:
  - url: "https://raw.githubusercontent.com/AlexanderVanhee/Gradia/main/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Gradia-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "gradia"
repology:
  - "gradia"
src_url:
  - "https://github.com/pkgforge-dev/Gradia-AppImage"
tag:
  - "screenshot"
  - "editor"
  - "annotate"
  - "gnome"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Gradia-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Gradia-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
