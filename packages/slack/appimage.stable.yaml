#!/SBUILD
_disabled: false

pkg: "slack"
pkg_id: "pkgforge-dev.slack"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/slack"
category:
  - "Network"
  - "InstantMessaging"
  - "Chat"
description: "Team messaging and collaboration app for channels, chat, and file sharing"
homepage:
  - "https://slack.com"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "Proprietary"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Slack-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "slack"
repology:
  - "slack"
src_url:
  - "https://github.com/pkgforge-dev/Slack-AppImage"
tag:
  - "chat"
  - "messaging"
  - "collaboration"
  - "slack"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Slack-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Slack-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
