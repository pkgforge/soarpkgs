#!/SBUILD
_disabled: false

pkg: "asunder"
pkg_id: "pkgforge-dev.asunder"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/asunder"
category:
  - "Audio"
  - "AudioVideo"
description: "Graphical Audio CD ripper and encoder for Linux"
homepage:
  - "http://littlesvr.ca/asunder/"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0-or-later"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Asunder-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "asunder"
repology:
  - "asunder"
src_url:
  - "https://github.com/pkgforge-dev/Asunder-AppImage"
tag:
  - "audio"
  - "cd-ripper"
  - "encoder"
  - "cdda"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Asunder-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Asunder-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
