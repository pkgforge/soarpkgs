#!/SBUILD
_disabled: false

pkg: "bigpemu"
pkg_id: "pkgforge-dev.bigpemu"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/bigpemu"
category:
  - "Emulator"
  - "Game"
description: "Atari Jaguar emulator with high compatibility and enhancement features"
homepage:
  - "https://www.richwhitehouse.com/jaguar/"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "Proprietary"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/BigPEmu-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "bigpemu"
repology:
  - "bigpemu"
src_url:
  - "https://github.com/pkgforge-dev/BigPEmu-AppImage"
tag:
  - "emulator"
  - "atari"
  - "jaguar"
  - "gaming"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/BigPEmu-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/BigPEmu-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
