#!/SBUILD
_disabled: false

pkg: "snes9x"
pkg_id: "pkgforge-dev.snes9x"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/snes9x"
category:
  - "Emulator"
  - "Game"
description: "Portable Super Nintendo Entertainment System (SNES) emulator"
homepage:
  - "http://www.snes9x.com"
  - "https://github.com/snes9xgit/snes9x"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "Custom"
build_asset:
  - url: "https://raw.githubusercontent.com/snes9xgit/snes9x/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Snes9x-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "snes9x"
repology:
  - "snes9x"
src_url:
  - "https://github.com/pkgforge-dev/Snes9x-AppImage-Enhanced"
tag:
  - "emulator"
  - "snes"
  - "nintendo"
  - "gaming"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Snes9x-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Snes9x-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
