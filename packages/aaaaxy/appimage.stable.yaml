#!/SBUILD
_disabled: false

pkg: "aaaaxy"
pkg_id: "pkgforge-dev.aaaaxy"
pkg_type: "appimage"
app_id: "io.github.divverent.aaaaxy"
ghcr_pkg: "pkgforge-dev/aaaaxy"
category:
  - "ActionGame"
  - "Game"
description: "Nonlinear 2D puzzle platformer taking place in impossible spaces"
homepage:
  - "https://divVerent.github.io/aaaaxy"
  - "https://github.com/divVerent/aaaaxy"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "Apache-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/divVerent/aaaaxy/refs/heads/main/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/AAAAXY-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "aaaaxy"
repology:
  - "aaaaxy"
src_url:
  - "https://github.com/pkgforge-dev/AAAAXY-AppImage-Enhanced"
tag:
  - "game"
  - "platformer"
  - "puzzle"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/AAAAXY-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/AAAAXY-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
