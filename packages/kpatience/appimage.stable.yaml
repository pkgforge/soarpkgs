#!/SBUILD
_disabled: false

pkg: "kpatience"
pkg_id: "pkgforge-dev.kpatience"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/kpatience"
category:
  - "Game"
description: "KPatience offers a selection of solitaire card games"
homepage:
  - "https://apps.kde.org/kpat"
  - "https://invent.kde.org/games/kpat"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0-or-later"
build_asset:
  - url: "https://invent.kde.org/games/kpat/-/raw/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/KPatience-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "kpatience"
repology:
  - "kpat"
src_url:
  - "https://github.com/pkgforge-dev/KPatience-AppImage"
tag:
  - "solitaire"
  - "card-game"
  - "kde"
  - "patience"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/KPatience-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/KPatience-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
