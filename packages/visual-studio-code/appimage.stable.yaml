#!/SBUILD
_disabled: false

pkg: "visual-studio-code"
pkg_id: "pkgforge-dev.visual-studio-code"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/visual-studio-code"
category:
  - "Development"
  - "IDE"
  - "TextEditor"
description: "Code editor with debugging, Git control and extensions by Microsoft"
homepage:
  - "https://code.visualstudio.com"
  - "https://github.com/microsoft/vscode"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "Proprietary"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Visual-Studio-Code-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "visual-studio-code"
src_url:
  - "https://github.com/pkgforge-dev/Visual-Studio-Code-AppImage"
tag:
  - "editor"
  - "ide"
  - "development"
  - "vscode"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Visual-Studio-Code-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Visual-Studio-Code-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
