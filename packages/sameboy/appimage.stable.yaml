#!/SBUILD
_disabled: false

pkg: "sameboy"
pkg_id: "pkgforge-dev.sameboy"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/sameboy"
category:
  - "Emulator"
  - "Game"
description: "Accurate Game Boy and Game Boy Color emulator written in C"
homepage:
  - "https://sameboy.github.io"
  - "https://github.com/LIJI32/SameBoy"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://raw.githubusercontent.com/LIJI32/SameBoy/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/SameBoy-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "sameboy"
repology:
  - "sameboy"
src_url:
  - "https://github.com/pkgforge-dev/SameBoy-AppImage"
tag:
  - "emulator"
  - "gameboy"
  - "gbc"
  - "retro"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/SameBoy-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/SameBoy-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
