#!/SBUILD
_disabled: false

pkg: "extremetuxracer"
pkg_id: "pkgforge-dev.extremetuxracer"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/extremetuxracer"
category:
  - "Game"
  - "ArcadeGame"
  - "SportsGame"
description: "Downhill racing game starring Tux"
homepage:
  - "https://sourceforge.net/projects/extremetuxracer/"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://sourceforge.net/p/extremetuxracer/code/HEAD/tree/trunk/COPYING?format=raw"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/ExtremeTuxRacer-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "extremetuxracer"
repology:
  - "extremetuxracer"
src_url:
  - "https://github.com/pkgforge-dev/ExtremeTuxRacer-AppImage"
tag:
  - "game"
  - "racing"
  - "tux"
  - "arcade"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/ExtremeTuxRacer-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/ExtremeTuxRacer-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
