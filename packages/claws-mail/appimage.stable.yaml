#!/SBUILD
_disabled: false

pkg: "claws-mail"
pkg_id: "pkgforge-dev.claws-mail"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/claws-mail"
category:
  - "Network"
  - "Email"
description: "The user-friendly, lightweight, and fast GTK+ e-mail client and news reader"
homepage:
  - "https://www.claws-mail.org"
  - "https://git.claws-mail.org/?p=claws.git"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0-or-later"
build_asset:
  - url: "https://git.claws-mail.org/?p=claws.git;a=blob_plain;f=COPYING;hb=HEAD"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Claws-Mail-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "claws-mail"
repology:
  - "claws-mail"
src_url:
  - "https://github.com/pkgforge-dev/Claws-Mail-AppImage"
tag:
  - "email"
  - "client"
  - "gtk"
  - "news"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Claws-Mail-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Claws-Mail-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
