#!/SBUILD
_disabled: false

pkg: "xeyes"
pkg_id: "pkgforge-dev.xeyes"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/xeyes"
category:
  - "Amusement"
  - "Utility"
description: "Classic X11 demo with googly eyes that follow the mouse cursor"
homepage:
  - "https://gitlab.freedesktop.org/xorg/app/xeyes"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://gitlab.freedesktop.org/xorg/app/xeyes/-/raw/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/xeyes-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "xeyes"
repology:
  - "xeyes"
src_url:
  - "https://github.com/pkgforge-dev/xeyes-AppImage"
tag:
  - "x11"
  - "xorg"
  - "eyes"
  - "demo"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/xeyes-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/xeyes-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
