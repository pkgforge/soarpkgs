#!/SBUILD
_disabled: false

pkg: "ffmpeg"
pkg_id: "pkgforge-dev.ffmpeg"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/ffmpeg"
category:
  - "AudioVideo"
  - "Video"
  - "Audio"
description: "Complete cross-platform solution to record, convert and stream audio and video"
homepage:
  - "https://ffmpeg.org"
  - "https://github.com/FFmpeg/FFmpeg"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/FFmpeg/FFmpeg/master/COPYING.GPLv3"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/FFmpeg-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "ffmpeg"
repology:
  - "ffmpeg"
src_url:
  - "https://github.com/pkgforge-dev/FFmpeg-AppImage"
tag:
  - "multimedia"
  - "video"
  - "audio"
  - "encoder"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/FFmpeg-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/FFmpeg-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
