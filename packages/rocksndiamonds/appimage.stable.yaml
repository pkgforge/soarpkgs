#!/SBUILD
_disabled: false

pkg: "rocksndiamonds"
pkg_id: "pkgforge-dev.rocksndiamonds"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/rocksndiamonds"
category:
  - "Game"
  - "ArcadeGame"
  - "LogicGame"
description: "Arcade puzzle game inspired by Boulder Dash, Emerald Mine, and Sokoban"
homepage:
  - "https://www.artsoft.org/rocksndiamonds/"
  - "https://github.com/tuero/rocksndiamonds"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/tuero/rocksndiamonds/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/RocksnDiamonds-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "rocksndiamonds"
repology:
  - "rocksndiamonds"
src_url:
  - "https://github.com/pkgforge-dev/RocksnDiamonds-AppImage"
tag:
  - "puzzle"
  - "arcade"
  - "boulderdash"
  - "game"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/RocksnDiamonds-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/RocksnDiamonds-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
