#!/SBUILD
_disabled: false

pkg: "audacity"
pkg_id: "pkgforge-dev.audacity"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/audacity"
category:
  - "Audio"
  - "AudioVideoEditing"
  - "Recorder"
description: "Easy-to-use, multi-track audio editor and recorder"
homepage:
  - "https://www.audacityteam.org"
  - "https://github.com/audacity/audacity"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0-or-later"
build_asset:
  - url: "https://raw.githubusercontent.com/audacity/audacity/master/LICENSE.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Audacity-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "audacity"
repology:
  - "audacity"
src_url:
  - "https://github.com/pkgforge-dev/Audacity-AppImage-Enhanced"
tag:
  - "audio"
  - "editor"
  - "recorder"
  - "multitrack"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Audacity-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Audacity-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
