#!/SBUILD
_disabled: false

pkg: "galculator"
pkg_id: "pkgforge-dev.galculator"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/galculator"
category:
  - "Utility"
  - "Calculator"
  - "Science"
description: "GTK 2 / GTK 3 based scientific calculator"
homepage:
  - "https://github.com/galculator/galculator"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0-or-later"
build_asset:
  - url: "https://raw.githubusercontent.com/galculator/galculator/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Galculator-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "galculator"
repology:
  - "galculator"
src_url:
  - "https://github.com/pkgforge-dev/Galculator-AppImage"
tag:
  - "calculator"
  - "gtk"
  - "scientific"
  - "math"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Galculator-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Galculator-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
