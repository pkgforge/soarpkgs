#!/SBUILD
_disabled: false

pkg: "clk"
pkg_id: "pkgforge-dev.clk"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/clk"
category:
  - "Emulator"
description: "Latency-hating emulator of many 8- and 16-bit retro computers and consoles"
homepage:
  - "https://github.com/TomHarte/CLK"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://raw.githubusercontent.com/TomHarte/CLK/master/LICENCE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/CLK-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "clk"
repology:
  - "clock-signal"
src_url:
  - "https://github.com/pkgforge-dev/CLK-AppImage"
tag:
  - "emulator"
  - "retro"
  - "8-bit"
  - "16-bit"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/CLK-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/CLK-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
