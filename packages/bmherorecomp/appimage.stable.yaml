#!/SBUILD
_disabled: false

pkg: "bmherorecomp"
pkg_id: "pkgforge-dev.bmherorecomp"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/bmherorecomp"
category:
  - "Game"
  - "ActionGame"
  - "AdventureGame"
description: "Static recompilation of Bomberman Hero for the Nintendo 64"
homepage:
  - "https://github.com/RevoSucks/BMHeroRecomp"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/RevoSucks/BMHeroRecomp/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/BMHeroRecomp-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "bmherorecomp"
src_url:
  - "https://github.com/pkgforge-dev/BMHeroRecomp-AppImage-Enhanced"
tag:
  - "game"
  - "n64"
  - "recompilation"
  - "bomberman"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/BMHeroRecomp-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/BMHeroRecomp-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
