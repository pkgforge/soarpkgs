#!/SBUILD
_disabled: false

pkg: "xash3d-fwgs"
pkg_id: "pkgforge-dev.xash3d-fwgs"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/xash3d-fwgs"
category:
  - "Game"
  - "ActionGame"
description: "Game engine compatible with the Half-Life (GoldSrc) engine"
homepage:
  - "https://github.com/FWGS/xash3d-fwgs"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Xash3D-FWGS-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "xash3d-fwgs"
repology:
  - "xash3d-fwgs"
src_url:
  - "https://github.com/pkgforge-dev/Xash3D-FWGS-AppImage-Enhanced"
tag:
  - "engine"
  - "half-life"
  - "goldsrc"
  - "fps"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Xash3D-FWGS-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Xash3D-FWGS-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
