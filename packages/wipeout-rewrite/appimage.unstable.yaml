#!/SBUILD
_disabled: false

pkg: "wipeout-rewrite"
pkg_id: "pkgforge-dev.wipeout-rewrite"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/wipeout-rewrite"
category:
  - "Game"
  - "ArcadeGame"
description: "A re-implementation of the 1995 PSX game wipEout"
homepage:
  - "https://github.com/phoboslab/wipeout-rewrite"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/wipEout-Rewrite-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "wipeout-rewrite"
repology:
  - "wipeout-rewrite"
src_url:
  - "https://github.com/pkgforge-dev/wipEout-Rewrite-AppImage"
tag:
  - "game"
  - "racing"
  - "wipeout"
  - "remake"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION="HEAD-$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/wipEout-Rewrite-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')"
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/wipEout-Rewrite-AppImage@${REMOTE_PKGVER#HEAD-}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
