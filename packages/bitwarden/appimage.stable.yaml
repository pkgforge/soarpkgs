#!/SBUILD
_disabled: false

pkg: "bitwarden"
pkg_id: "pkgforge-dev.bitwarden"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/bitwarden"
category:
  - "Utility"
  - "Security"
description: "Secure and free password manager for all of your devices"
homepage:
  - "https://bitwarden.com"
  - "https://github.com/bitwarden/clients"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/bitwarden/clients/main/LICENSE.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Bitwarden-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "bitwarden"
repology:
  - "bitwarden"
src_url:
  - "https://github.com/pkgforge-dev/Bitwarden-AppImage-Enhanced"
tag:
  - "password"
  - "security"
  - "vault"
  - "encryption"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Bitwarden-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}" | sed "s/^v//"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Bitwarden-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
