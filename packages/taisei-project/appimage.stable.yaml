#!/SBUILD
_disabled: false

pkg: "taisei-project"
pkg_id: "pkgforge-dev.taisei-project"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/taisei-project"
app_id: "org.taisei_project.Taisei"
category:
  - "Game"
description: "Unofficial AppImage of Taisei-Project [Maintainer=@Link4Electronics]"
homepage:
  - "https://taisei-project.org"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://raw.githubusercontent.com/taisei-project/taisei/refs/heads/master/COPYING.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Taisei-Project-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "taisei-project"
repology:
  - "taisei"
src_url:
  - "https://github.com/pkgforge-dev/Taisei-Project-AppImage"
tag:
  - "shoot-em-up"
  - "bullet-hell"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Taisei-Project-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Taisei-Project-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
