#!/SBUILD
_disabled: false

pkg: "quickshell"
pkg_id: "pkgforge-dev.quickshell"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/quickshell"
category:
  - "System"
  - "Utility"
description: "Flexible QtQuick based desktop shell toolkit"
homepage:
  - "https://quickshell.outfoxxed.me"
  - "https://github.com/quickshell-mirror/quickshell"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "LGPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/quickshell-mirror/quickshell/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Quickshell-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "quickshell"
repology:
  - "quickshell"
src_url:
  - "https://github.com/pkgforge-dev/Quickshell-AppImage"
tag:
  - "wayland"
  - "qtquick"
  - "desktop-shell"
  - "toolkit"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Quickshell-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Quickshell-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
