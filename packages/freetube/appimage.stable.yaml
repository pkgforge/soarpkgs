#!/SBUILD
_disabled: false

pkg: "freetube"
pkg_id: "pkgforge-dev.freetube"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/freetube"
category:
  - "Video"
  - "Player"
  - "Network"
description: "An open source desktop YouTube player built with privacy in mind"
homepage:
  - "https://freetubeapp.io"
  - "https://github.com/FreeTubeApp/FreeTube"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "AGPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/FreeTubeApp/FreeTube/development/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/FreeTube-Appimage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "freetube"
repology:
  - "freetube"
src_url:
  - "https://github.com/pkgforge-dev/FreeTube-Appimage"
tag:
  - "youtube"
  - "video"
  - "player"
  - "privacy"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/FreeTube-Appimage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/FreeTube-Appimage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
