#!/SBUILD
_disabled: false

pkg: "neverball"
pkg_id: "pkgforge-dev.neverball"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/neverball"
category:
  - "Game"
  - "ArcadeGame"
description: "Tilt the floor to roll a ball through obstacle courses before time runs out"
homepage:
  - "https://neverball.org"
  - "https://github.com/Neverball/neverball"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/Neverball/neverball/master/LICENSE.md"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Neverball-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "neverball"
repology:
  - "neverball"
src_url:
  - "https://github.com/pkgforge-dev/Neverball-AppImage"
tag:
  - "game"
  - "arcade"
  - "ball"
  - "3d"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Neverball-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Neverball-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
