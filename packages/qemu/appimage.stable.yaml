#!/SBUILD
_disabled: false

pkg: "qemu"
pkg_id: "pkgforge-dev.qemu"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/qemu"
category:
  - "Emulator"
  - "System"
  - "Utility"
description: "Generic and open source machine emulator and virtualizer"
homepage:
  - "https://www.qemu.org"
  - "https://github.com/qemu/qemu"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/qemu/qemu/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/QEMU-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "qemu"
repology:
  - "qemu"
src_url:
  - "https://github.com/pkgforge-dev/QEMU-AppImage"
tag:
  - "emulator"
  - "virtualization"
  - "kvm"
  - "system"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/QEMU-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/QEMU-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
