#!/SBUILD
_disabled: false

pkg: "gnome-web"
pkg_id: "pkgforge-dev.gnome-web"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/gnome-web"
category:
  - "Network"
  - "WebBrowser"
  - "GNOME"
description: "A simple, clean, beautiful view of the Web"
homepage:
  - "https://apps.gnome.org/Epiphany"
  - "https://gitlab.gnome.org/GNOME/epiphany"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://gitlab.gnome.org/GNOME/epiphany/-/raw/main/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Gnome-Web-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "gnome-web"
repology:
  - "gnome-web"
src_url:
  - "https://github.com/pkgforge-dev/Gnome-Web-AppImage"
tag:
  - "browser"
  - "web"
  - "gnome"
  - "epiphany"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Gnome-Web-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Gnome-Web-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
