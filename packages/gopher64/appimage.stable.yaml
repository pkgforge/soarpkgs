#!/SBUILD
_disabled: false

pkg: "gopher64"
pkg_id: "pkgforge-dev.gopher64"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/gopher64"
category:
  - "Emulator"
  - "Game"
description: "Highly compatible cross-platform Nintendo 64 emulator written in Rust"
homepage:
  - "https://github.com/gopher64/gopher64"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/gopher64/gopher64/main/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Gopher64-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "gopher64"
repology:
  - "gopher64"
src_url:
  - "https://github.com/pkgforge-dev/Gopher64-AppImage"
tag:
  - "n64"
  - "emulator"
  - "nintendo64"
  - "rust"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Gopher64-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}" | sed "s/^v//"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Gopher64-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
