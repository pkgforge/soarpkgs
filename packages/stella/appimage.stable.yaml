#!/SBUILD
_disabled: false

pkg: "stella"
pkg_id: "pkgforge-dev.stella"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/stella"
category:
  - "Emulator"
  - "Game"
description: "A multi-platform Atari 2600 VCS emulator"
homepage:
  - "https://stella-emu.github.io"
  - "https://github.com/stella-emu/stella"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/stella-emu/stella/master/License.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Stella-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "stella"
repology:
  - "stella"
src_url:
  - "https://github.com/pkgforge-dev/Stella-AppImage"
tag:
  - "atari"
  - "emulator"
  - "2600"
  - "vcs"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Stella-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Stella-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
