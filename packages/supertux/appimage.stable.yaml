#!/SBUILD
_disabled: false

pkg: "supertux"
pkg_id: "pkgforge-dev.supertux"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/supertux"
app_id: "org.supertux.SuperTux"
category:
  - "Game"
description: "A classic 2D jump'n'run sidescroller game featuring Tux"
homepage:
  - "https://www.supertux.org"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/SuperTux/supertux/refs/heads/master/LICENSE.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/SuperTux-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "supertux"
repology:
  - "supertux"
src_url:
  - "https://github.com/pkgforge-dev/SuperTux-AppImage-Enhanced"
tag:
  - "platformer"
  - "game"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/SuperTux-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/SuperTux-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
