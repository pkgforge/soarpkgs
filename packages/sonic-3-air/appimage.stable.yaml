#!/SBUILD
_disabled: false

pkg: "sonic-3-air"
pkg_id: "pkgforge-dev.sonic-3-air"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/sonic-3-air"
category:
  - "Game"
  - "ArcadeGame"
  - "ActionGame"
description: "Fan-made widescreen remaster of Sonic 3 & Knuckles built on the Oxygen Engine"
homepage:
  - "https://sonic3air.org"
  - "https://github.com/Eukaryot/sonic3air"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/Eukaryot/sonic3air/main/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Sonic-3-AIR-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "sonic-3-air"
repology:
  - "sonic3air"
src_url:
  - "https://github.com/pkgforge-dev/Sonic-3-AIR-AppImage"
tag:
  - "game"
  - "sonic"
  - "platformer"
  - "remaster"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Sonic-3-AIR-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}" | sed "s/^v//"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Sonic-3-AIR-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
