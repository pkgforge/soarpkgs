#!/SBUILD
_disabled: false

pkg: "copyq"
pkg_id: "pkgforge-dev.copyq"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/copyq"
category:
  - "Utility"
description: "Clipboard manager with advanced features"
homepage:
  - "https://hluk.github.io/CopyQ/"
  - "https://github.com/hluk/CopyQ"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/hluk/CopyQ/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/CopyQ-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "copyq"
repology:
  - "copyq"
src_url:
  - "https://github.com/pkgforge-dev/CopyQ-AppImage"
tag:
  - "clipboard"
  - "manager"
  - "qt"
  - "utility"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/CopyQ-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/CopyQ-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
