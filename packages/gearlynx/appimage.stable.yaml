#!/SBUILD
_disabled: false

pkg: "gearlynx"
pkg_id: "pkgforge-dev.gearlynx"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/gearlynx"
category:
  - "Emulator"
  - "Game"
description: "Atari Lynx emulator and debugger"
homepage:
  - "https://github.com/drhelius/Gearlynx"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/drhelius/Gearlynx/main/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Gearlynx-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "gearlynx"
repology:
  - "gearlynx"
src_url:
  - "https://github.com/pkgforge-dev/Gearlynx-AppImage"
tag:
  - "emulator"
  - "atari"
  - "lynx"
  - "retro"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Gearlynx-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Gearlynx-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
