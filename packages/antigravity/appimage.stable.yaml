#!/SBUILD
_disabled: false

pkg: "antigravity"
pkg_id: "pkgforge-dev.antigravity"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/antigravity"
category:
  - "Development"
  - "IDE"
  - "TextEditor"
description: "Agentic AI-powered IDE from Google"
homepage:
  - "https://antigravity.google"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "Proprietary"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Antigravity-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "antigravity"
repology:
  - "antigravity"
src_url:
  - "https://github.com/pkgforge-dev/Antigravity-AppImage"
tag:
  - "ai"
  - "development"
  - "editor"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Antigravity-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Antigravity-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
