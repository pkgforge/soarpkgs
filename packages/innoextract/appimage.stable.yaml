#!/SBUILD
_disabled: false

pkg: "innoextract"
pkg_id: "pkgforge-dev.innoextract"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/innoextract"
category:
  - "Utility"
  - "Archiving"
description: "A tool to unpack installers created by Inno Setup"
homepage:
  - "https://constexpr.org/innoextract"
  - "https://github.com/dscharrer/innoextract"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "Zlib"
build_asset:
  - url: "https://raw.githubusercontent.com/dscharrer/innoextract/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/innoextract-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "innoextract"
repology:
  - "innoextract"
src_url:
  - "https://github.com/pkgforge-dev/innoextract-AppImage"
tag:
  - "innosetup"
  - "extract"
  - "installer"
  - "unpack"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/innoextract-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/innoextract-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
