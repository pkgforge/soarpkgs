#!/SBUILD
_disabled: false

pkg: "zsnes"
pkg_id: "pkgforge-dev.zsnes"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/zsnes"
category:
  - "Emulator"
  - "Game"
description: "A maintained fork of ZSNES, a Super Nintendo (SNES) emulator"
homepage:
  - "https://www.zsnes.com"
  - "https://github.com/xyproto/zsnes"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/xyproto/zsnes/main/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/ZSNES-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "zsnes"
repology:
  - "zsnes"
src_url:
  - "https://github.com/pkgforge-dev/ZSNES-AppImage"
tag:
  - "emulator"
  - "snes"
  - "nintendo"
  - "retro"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/ZSNES-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/ZSNES-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
