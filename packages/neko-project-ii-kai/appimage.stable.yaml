#!/SBUILD
_disabled: false

pkg: "neko-project-ii-kai"
pkg_id: "pkgforge-dev.neko-project-ii-kai"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/neko-project-ii-kai"
category:
  - "Emulator"
  - "Game"
description: "NEC PC-9801 series emulator (Neko Project II Kai fork)"
homepage:
  - "https://github.com/AZO234/NP2kai"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://raw.githubusercontent.com/AZO234/NP2kai/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Neko-Project-II-Kai-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "neko-project-ii-kai"
repology:
  - "np2kai"
src_url:
  - "https://github.com/pkgforge-dev/Neko-Project-II-Kai-AppImage"
tag:
  - "emulator"
  - "pc-98"
  - "pc-9801"
  - "nec"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Neko-Project-II-Kai-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Neko-Project-II-Kai-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
