#!/SBUILD
_disabled: false

pkg: "xclock"
pkg_id: "pkgforge-dev.xclock"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/xclock"
category:
  - "Utility"
  - "Clock"
  - "System"
description: "Classic X11 analog and digital clock application from X.Org"
homepage:
  - "https://gitlab.freedesktop.org/xorg/app/xclock"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://gitlab.freedesktop.org/xorg/app/xclock/-/raw/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/xclock-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "xclock"
repology:
  - "xclock"
src_url:
  - "https://github.com/pkgforge-dev/xclock-AppImage"
tag:
  - "clock"
  - "x11"
  - "xorg"
  - "time"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/xclock-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/xclock-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
