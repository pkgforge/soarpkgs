#!/SBUILD
_disabled: false

pkg: "songrec"
pkg_id: "pkgforge-dev.songrec"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/songrec"
category:
  - "Audio"
  - "Utility"
description: "An open-source Shazam client for Linux, written in Rust"
homepage:
  - "https://github.com/marin-m/SongRec"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/marin-m/SongRec/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/SongRec-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "songrec"
repology:
  - "songrec"
src_url:
  - "https://github.com/pkgforge-dev/SongRec-AppImage"
tag:
  - "shazam"
  - "audio"
  - "recognition"
  - "music"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/SongRec-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/SongRec-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
