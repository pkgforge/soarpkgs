#!/SBUILD
_disabled: false

pkg: "fooyin"
pkg_id: "pkgforge-dev.fooyin"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/fooyin"
category:
  - "Audio"
  - "Music"
  - "Player"
description: "A customisable Qt music player for Linux"
homepage:
  - "https://fooyin.org"
  - "https://github.com/fooyin/fooyin"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0-or-later"
build_asset:
  - url: "https://raw.githubusercontent.com/fooyin/fooyin/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/fooyin-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "fooyin"
repology:
  - "fooyin"
src_url:
  - "https://github.com/pkgforge-dev/fooyin-AppImage"
tag:
  - "music"
  - "player"
  - "audio"
  - "qt"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/fooyin-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/fooyin-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
