#!/SBUILD
_disabled: false

pkg: "gram"
pkg_id: "pkgforge-dev.gram"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/gram"
category:
  - "Development"
  - "TextEditor"
  - "IDE"
description: "Fast, stable code editor forked from Zed, without AI or subscriptions"
homepage:
  - "https://codeberg.org/GramEditor/gram"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0-or-later"
build_asset:
  - url: "https://codeberg.org/GramEditor/gram/raw/branch/main/LICENSE-GPL"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Gram-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "gram"
repology:
  - "gram"
src_url:
  - "https://github.com/pkgforge-dev/Gram-AppImage-Enhanced"
tag:
  - "editor"
  - "code-editor"
  - "zed"
  - "ide"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Gram-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Gram-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
