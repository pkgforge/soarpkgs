#!/SBUILD
_disabled: false

pkg: "asphyxia-core"
pkg_id: "pkgforge-dev.asphyxia-core"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/asphyxia-core"
category:
  - "Game"
  - "Network"
  - "Emulator"
description: "Local private server for Konami BEMANI arcade rhythm games"
homepage:
  - "https://asphyxia-core.github.io"
  - "https://github.com/asphyxia-core/core"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/asphyxia-core/core/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Asphyxia-CORE-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "asphyxia-core"
src_url:
  - "https://github.com/pkgforge-dev/Asphyxia-CORE-AppImage"
tag:
  - "game"
  - "server"
  - "bemani"
  - "rhythm"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Asphyxia-CORE-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}" | sed "s/^v//"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Asphyxia-CORE-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
