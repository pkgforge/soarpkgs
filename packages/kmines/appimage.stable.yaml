#!/SBUILD
_disabled: false

pkg: "kmines"
pkg_id: "pkgforge-dev.kmines"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/kmines"
category:
  - "Game"
description: "KMines is the classic Minesweeper game"
homepage:
  - "https://apps.kde.org/kmines"
  - "https://invent.kde.org/games/kmines"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0-or-later"
build_asset:
  - url: "https://invent.kde.org/games/kmines/-/raw/master/LICENSES/GPL-2.0-or-later.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/KMines-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "kmines"
repology:
  - "kmines"
src_url:
  - "https://github.com/pkgforge-dev/KMines-AppImage"
tag:
  - "game"
  - "minesweeper"
  - "kde"
  - "puzzle"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/KMines-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/KMines-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
