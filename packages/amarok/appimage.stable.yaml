#!/SBUILD
_disabled: false

pkg: "amarok"
pkg_id: "pkgforge-dev.amarok"
pkg_type: "appimage"
app_id: "org.kde.amarok"
ghcr_pkg: "pkgforge-dev/amarok"
category:
  - "Audio"
  - "Music"
  - "Player"
description: "Powerful music player that lets you rediscover your music"
homepage:
  - "https://amarok.kde.org"
  - "https://invent.kde.org/multimedia/amarok"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/KDE/amarok/refs/heads/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Amarok-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "amarok"
repology:
  - "amarok"
src_url:
  - "https://github.com/pkgforge-dev/Amarok-AppImage"
tag:
  - "audio"
  - "music"
  - "player"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Amarok-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Amarok-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
