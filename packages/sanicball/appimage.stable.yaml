#!/SBUILD
_disabled: false

pkg: "sanicball"
pkg_id: "pkgforge-dev.sanicball"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/sanicball"
category:
  - "Game"
  - "ArcadeGame"
  - "SportsGame"
description: "Extraordinarily fast Sonic-themed ball racing game made in Unity"
homepage:
  - "https://github.com/BK-TN/Sanicball"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
build_asset:
  - url: "https://raw.githubusercontent.com/BK-TN/Sanicball/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Sanicball-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "sanicball"
src_url:
  - "https://github.com/pkgforge-dev/Sanicball-AppImage"
tag:
  - "game"
  - "racing"
  - "unity"
  - "sonic"
x_exec:
  host:
    - "x86_64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Sanicball-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Sanicball-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
