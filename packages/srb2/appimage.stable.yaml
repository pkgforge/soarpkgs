#!/SBUILD
_disabled: false

pkg: "srb2"
pkg_id: "pkgforge-dev.srb2"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/srb2"
category:
  - "Game"
  - "ArcadeGame"
  - "ActionGame"
description: "A 3D Sonic the Hedgehog fan game based off of the Doom Legacy engine"
homepage:
  - "https://www.srb2.org"
  - "https://github.com/STJr/SRB2"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/STJr/SRB2/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/SRB2-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "srb2"
repology:
  - "srb2"
src_url:
  - "https://github.com/pkgforge-dev/SRB2-AppImage"
tag:
  - "game"
  - "sonic"
  - "platformer"
  - "doom"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/SRB2-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/SRB2-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
