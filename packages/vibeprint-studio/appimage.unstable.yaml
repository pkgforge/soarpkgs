#!/SBUILD
_disabled: false

pkg: "vibeprint-studio"
pkg_id: "pkgforge-dev.vibeprint-studio"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/vibeprint-studio"
category:
  - "Graphics"
  - "Photography"
description: "Automatically layout and print images in an ICC-aware environment"
homepage:
  - "https://github.com/crenedecotret/vibeprint"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/crenedecotret/vibeprint/refs/heads/main/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Vibeprint-Studio-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "vibeprint-studio"
src_url:
  - "https://github.com/pkgforge-dev/Vibeprint-Studio-AppImage"
tag:
  - "print"
  - "layout"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION="HEAD-$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Vibeprint-Studio-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')"
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Vibeprint-Studio-AppImage@${REMOTE_PKGVER#HEAD-}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
