#!/SBUILD
_disabled: false

pkg: "openrct2"
pkg_id: "pkgforge-dev.openrct2"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/openrct2"
category:
  - "Game"
  - "Simulation"
  - "StrategyGame"
description: "An open source re-implementation of RollerCoaster Tycoon 2"
homepage:
  - "https://openrct2.io"
  - "https://github.com/OpenRCT2/OpenRCT2"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/OpenRCT2/OpenRCT2/develop/licence.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/OpenRCT2-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "openrct2"
repology:
  - "openrct2"
src_url:
  - "https://github.com/pkgforge-dev/OpenRCT2-AppImage-Enhanced"
tag:
  - "game"
  - "simulation"
  - "rollercoaster"
  - "tycoon"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/OpenRCT2-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/OpenRCT2-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
