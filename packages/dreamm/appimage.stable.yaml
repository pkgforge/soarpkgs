#!/SBUILD
_disabled: false

pkg: "dreamm"
pkg_id: "pkgforge-dev.dreamm"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/dreamm"
category:
  - "Emulator"
  - "Game"
  - "Utility"
description: "Emulator and launcher for classic LucasArts SCUMM adventure games"
homepage:
  - "https://dreamm.net"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "Proprietary"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/DREAMM-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "dreamm"
repology:
  - "dreamm"
src_url:
  - "https://github.com/pkgforge-dev/DREAMM-AppImage"
tag:
  - "emulator"
  - "scumm"
  - "lucasarts"
  - "games"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/DREAMM-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/DREAMM-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
