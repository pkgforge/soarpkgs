#!/SBUILD
_disabled: false

pkg: "tuxpuck"
pkg_id: "pkgforge-dev.tuxpuck"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/tuxpuck"
category:
  - "Game"
  - "ArcadeGame"
  - "SportsGame"
description: "Air hockey game and Shufflepuck Cafe clone featuring Tux"
homepage:
  - "https://wiki.debian.org/Games/TuxPuck"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Tuxpuck-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "tuxpuck"
repology:
  - "tuxpuck"
src_url:
  - "https://github.com/pkgforge-dev/Tuxpuck-AppImage"
tag:
  - "airhockey"
  - "game"
  - "tux"
  - "arcade"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Tuxpuck-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Tuxpuck-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
