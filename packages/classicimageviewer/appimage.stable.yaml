#!/SBUILD
_disabled: false

pkg: "classicimageviewer"
pkg_id: "pkgforge-dev.classicimageviewer"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/classicimageviewer"
category:
  - "Graphics"
  - "Viewer"
  - "RasterGraphics"
description: "A simple and fast image viewer and editor for Linux, BSDs and MacOS"
homepage:
  - "https://github.com/classicimageviewer/ClassicImageViewer"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0-or-later"
build_asset:
  - url: "https://raw.githubusercontent.com/classicimageviewer/ClassicImageViewer/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/ClassicImageViewer-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "classicimageviewer"
repology:
  - "classicimageviewer"
src_url:
  - "https://github.com/pkgforge-dev/ClassicImageViewer-AppImage-Enhanced"
tag:
  - "image"
  - "viewer"
  - "editor"
  - "graphics"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/ClassicImageViewer-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/ClassicImageViewer-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
