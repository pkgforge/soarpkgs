#!/SBUILD
_disabled: false

pkg: "mgba"
pkg_id: "pkgforge-dev.mgba"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/mgba"
category:
  - "Emulator"
  - "Game"
description: "mGBA Game Boy Advance emulator"
homepage:
  - "https://mgba.io/"
  - "https://github.com/mgba-emu/mgba"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/mgba-emu/mgba/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/mGBA-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "mgba"
repology:
  - "mgba"
src_url:
  - "https://github.com/pkgforge-dev/mGBA-AppImage-Enhanced"
tag:
  - "emulator"
  - "gba"
  - "gameboy"
  - "nintendo"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/mGBA-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/mGBA-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
