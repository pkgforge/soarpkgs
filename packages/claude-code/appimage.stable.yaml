#!/SBUILD
_disabled: false

pkg: "claude-code"
pkg_id: "pkgforge-dev.claude-code"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/claude-code"
category:
  - "Development"
  - "Utility"
description: "Agentic coding tool that lives in your terminal and understands your codebase"
homepage:
  - "https://claude.com/claude-code"
  - "https://github.com/anthropics/claude-code"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "Proprietary"
build_asset:
  - url: "https://raw.githubusercontent.com/anthropics/claude-code/main/LICENSE.md"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/claude-code-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "claude-code"
repology:
  - "claude-code"
src_url:
  - "https://github.com/pkgforge-dev/claude-code-AppImage"
tag:
  - "ai"
  - "cli"
  - "coding"
  - "agent"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/claude-code-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/claude-code-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
