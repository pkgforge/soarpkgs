#!/SBUILD
_disabled: false

pkg: "gpodder"
pkg_id: "pkgforge-dev.gpodder"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/gpodder"
category:
  - "Audio"
  - "Player"
  - "Feed"
description: "The gPodder podcast client and feed aggregator"
homepage:
  - "https://gpodder.github.io"
  - "https://github.com/gpodder/gpodder"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/gpodder/gpodder/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/gPodder-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "gpodder"
repology:
  - "gpodder"
src_url:
  - "https://github.com/pkgforge-dev/gPodder-AppImage"
tag:
  - "podcast"
  - "audio"
  - "player"
  - "feed"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/gPodder-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/gPodder-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
