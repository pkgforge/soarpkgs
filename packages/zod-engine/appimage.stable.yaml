#!/SBUILD
_disabled: false

pkg: "zod-engine"
pkg_id: "pkgforge-dev.zod-engine"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/zod-engine"
category:
  - "Game"
  - "StrategyGame"
description: "Open-source remake of the 1996 Bitmap Brothers real-time strategy game Z"
homepage:
  - "http://zod.sourceforge.net"
  - "https://sourceforge.net/projects/zod/"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Zod-Engine-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "zod-engine"
repology:
  - "zod-engine"
src_url:
  - "https://github.com/pkgforge-dev/Zod-Engine-AppImage"
tag:
  - "game"
  - "strategy"
  - "rts"
  - "remake"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Zod-Engine-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Zod-Engine-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
