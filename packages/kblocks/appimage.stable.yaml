#!/SBUILD
_disabled: false

pkg: "kblocks"
pkg_id: "pkgforge-dev.kblocks"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/kblocks"
category:
  - "Game"
  - "BlocksGame"
  - "KDE"
description: "Classic falling blocks (Tetris-like) game for KDE"
homepage:
  - "https://apps.kde.org/kblocks"
  - "https://invent.kde.org/games/kblocks"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0-or-later"
build_asset:
  - url: "https://invent.kde.org/games/kblocks/-/raw/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/KBlocks-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "kblocks"
repology:
  - "kblocks"
src_url:
  - "https://github.com/pkgforge-dev/KBlocks-AppImage"
tag:
  - "game"
  - "tetris"
  - "blocks"
  - "kde"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/KBlocks-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/KBlocks-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
