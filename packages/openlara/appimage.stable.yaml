#!/SBUILD
_disabled: false

pkg: "openlara"
pkg_id: "pkgforge-dev.openlara"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/openlara"
category:
  - "Game"
  - "AdventureGame"
  - "ActionGame"
description: "Classic Tomb Raider open-source engine reimplementation"
homepage:
  - "https://github.com/XProger/OpenLara"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "BSD-2-Clause"
build_asset:
  - url: "https://raw.githubusercontent.com/XProger/OpenLara/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/OpenLara-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "openlara"
repology:
  - "openlara"
src_url:
  - "https://github.com/pkgforge-dev/OpenLara-AppImage"
tag:
  - "game"
  - "tombraider"
  - "engine"
  - "adventure"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/OpenLara-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/OpenLara-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
