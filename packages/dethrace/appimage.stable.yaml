#!/SBUILD
_disabled: false

pkg: "dethrace"
pkg_id: "pkgforge-dev.dethrace"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/dethrace"
category:
  - "Game"
  - "ArcadeGame"
  - "ActionGame"
description: "Reverse-engineered reimplementation of the 1997 game Carmageddon"
homepage:
  - "https://github.com/dethrace-labs/dethrace"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0-or-later"
build_asset:
  - url: "https://raw.githubusercontent.com/dethrace-labs/dethrace/main/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/dethrace-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "dethrace"
repology:
  - "dethrace"
src_url:
  - "https://github.com/pkgforge-dev/dethrace-AppImage"
tag:
  - "game"
  - "carmageddon"
  - "racing"
  - "reverse-engineering"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/dethrace-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/dethrace-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
