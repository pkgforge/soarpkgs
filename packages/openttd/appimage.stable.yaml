#!/SBUILD
_disabled: false

pkg: "openttd"
pkg_id: "pkgforge-dev.openttd"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/openttd"
category:
  - "Game"
  - "Simulation"
  - "StrategyGame"
description: "Open source simulation game based upon Transport Tycoon Deluxe"
homepage:
  - "https://www.openttd.org/"
  - "https://github.com/OpenTTD/OpenTTD"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0"
build_asset:
  - url: "https://raw.githubusercontent.com/OpenTTD/OpenTTD/master/COPYING.md"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/OpenTTD-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "openttd"
repology:
  - "openttd"
src_url:
  - "https://github.com/pkgforge-dev/OpenTTD-AppImage"
tag:
  - "game"
  - "simulation"
  - "transport"
  - "strategy"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/OpenTTD-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/OpenTTD-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
