#!/SBUILD
_disabled: false

pkg: "spaghettikart"
pkg_id: "pkgforge-dev.spaghettikart"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/spaghettikart"
category:
  - "Game"
  - "ArcadeGame"
  - "SportsGame"
description: "Native PC port of Mario Kart 64"
homepage:
  - "https://github.com/HarbourMasters/SpaghettiKart"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "MIT"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/SpaghettiKart-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "spaghettikart"
repology:
  - "spaghettikart"
src_url:
  - "https://github.com/pkgforge-dev/SpaghettiKart-AppImage-Enhanced"
tag:
  - "mario-kart"
  - "racing"
  - "n64"
  - "port"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/SpaghettiKart-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/SpaghettiKart-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
