#!/SBUILD
_disabled: false

pkg: "constrict"
pkg_id: "pkgforge-dev.constrict"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/constrict"
category:
  - "Video"
  - "AudioVideo"
  - "Utility"
description: "Compress videos to target sizes"
homepage:
  - "https://gitlab.gnome.org/World/Constrict"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0-or-later"
build_asset:
  - url: "https://gitlab.gnome.org/World/Constrict/-/raw/main/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Constrict-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "constrict"
repology:
  - "constrict"
src_url:
  - "https://github.com/pkgforge-dev/Constrict-AppImage"
tag:
  - "video"
  - "compression"
  - "ffmpeg"
  - "gnome"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Constrict-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Constrict-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
