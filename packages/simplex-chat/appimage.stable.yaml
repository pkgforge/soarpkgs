#!/SBUILD
_disabled: false

pkg: "simplex-chat"
pkg_id: "pkgforge-dev.simplex-chat"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/simplex-chat"
category:
  - "Network"
  - "InstantMessaging"
  - "Chat"
description: "Private messaging network operating without any user identifiers"
homepage:
  - "https://simplex.chat"
  - "https://github.com/simplex-chat/simplex-chat"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "AGPL-3.0"
build_asset:
  - url: "https://raw.githubusercontent.com/simplex-chat/simplex-chat/stable/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/SimpleX-Chat-AppImage-Enhanced"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "simplex-chat"
repology:
  - "simplex-chat"
src_url:
  - "https://github.com/pkgforge-dev/SimpleX-Chat-AppImage-Enhanced"
tag:
  - "messaging"
  - "chat"
  - "privacy"
  - "p2p"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/SimpleX-Chat-AppImage-Enhanced/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}" | sed "s/^v//"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/SimpleX-Chat-AppImage-Enhanced@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
