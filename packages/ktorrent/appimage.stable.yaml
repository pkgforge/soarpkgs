#!/SBUILD
_disabled: false

pkg: "ktorrent"
pkg_id: "pkgforge-dev.ktorrent"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/ktorrent"
category:
  - "Network"
  - "FileTransfer"
  - "P2P"
description: "Powerful BitTorrent client by KDE"
homepage:
  - "https://apps.kde.org/ktorrent"
  - "https://invent.kde.org/network/ktorrent"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-2.0-or-later"
build_asset:
  - url: "https://invent.kde.org/network/ktorrent/-/raw/master/LICENSES/GPL-2.0-or-later.txt"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/KTorrent-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "ktorrent"
repology:
  - "ktorrent"
src_url:
  - "https://github.com/pkgforge-dev/KTorrent-AppImage"
tag:
  - "bittorrent"
  - "torrent"
  - "p2p"
  - "kde"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/KTorrent-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/KTorrent-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
