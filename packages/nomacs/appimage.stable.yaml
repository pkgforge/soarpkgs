#!/SBUILD
_disabled: false

pkg: "nomacs"
pkg_id: "pkgforge-dev.nomacs"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/nomacs"
category:
  - "Graphics"
  - "Viewer"
  - "Photography"
description: "Lightweight, fast image viewer supporting many formats and RAW files"
homepage:
  - "https://nomacs.org"
  - "https://github.com/nomacs/nomacs"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "GPL-3.0-or-later"
build_asset:
  - url: "https://raw.githubusercontent.com/nomacs/nomacs/master/LICENSE"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/Nomacs-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "nomacs"
repology:
  - "nomacs"
src_url:
  - "https://github.com/pkgforge-dev/Nomacs-AppImage"
tag:
  - "image"
  - "viewer"
  - "graphics"
  - "photography"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/Nomacs-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/Nomacs-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
