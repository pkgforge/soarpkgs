#!/SBUILD
_disabled: false

pkg: "lightzone"
pkg_id: "pkgforge-dev.lightzone"
pkg_type: "appimage"
ghcr_pkg: "pkgforge-dev/lightzone"
category:
  - "Graphics"
  - "Photography"
  - "RasterGraphics"
description: "Open-source professional-grade digital photo editor and darkroom software"
homepage:
  - "http://lightzoneproject.org"
  - "https://github.com/ktgw0316/LightZone"
maintainer:
  - "QaidVoid (contact@qaidvoid.dev)"
license:
  - "BSD-3-Clause"
build_asset:
  - url: "https://raw.githubusercontent.com/ktgw0316/LightZone/master/COPYING"
    out: "LICENSE"
note:
  - "Fetched from Pre Built Community Created AppImage. Check/Report @ https://github.com/pkgforge-dev/LightZone-AppImage"
  - "[PORTABLE] (Works on AnyLinux)"
provides:
  - "lightzone"
repology:
  - "lightzone"
src_url:
  - "https://github.com/pkgforge-dev/LightZone-AppImage"
tag:
  - "photo"
  - "editor"
  - "darkroom"
  - "raw"
x_exec:
  host:
    - "x86_64-linux"
    - "aarch64-linux"
  shell: "sh"
  pkgver: |
    VERSION=$(curl -qfsSL "https://api.github.com/repos/pkgforge-dev/LightZone-AppImage/releases/latest?per_page=20" | jq -r '.tag_name')
    echo "${VERSION%%@*}"
    echo "$VERSION"
  run: |
    soar dl "https://github.com/pkgforge-dev/LightZone-AppImage@${REMOTE_PKGVER}" --glob "*${ARCH}*.appimage" -o "./${PKG}" --yes
